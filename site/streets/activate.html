<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate STREETS License -- 4DA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 100%;
      margin: 20px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .subtitle {
      font-size: 14px;
      color: #A0A0A0;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    label {
      display: block;
      text-align: left;
      font-size: 13px;
      color: #A0A0A0;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #D4AF37; }
    input::placeholder { color: #666; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px 24px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #D4AF37;
      color: #000;
    }
    .btn-primary:hover { background: #C4A030; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-open-app {
      background: #22C55E;
      color: #000;
      margin-top: 10px;
    }
    .btn-open-app:hover { background: #16A34A; }
    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
    }
    .result.success {
      background: #22C55E10;
      border: 1px solid #22C55E30;
      color: #22C55E;
    }
    .result.error {
      background: #EF444410;
      border: 1px solid #EF444430;
      color: #EF4444;
    }
    .license-key {
      display: block;
      margin-top: 8px;
      padding: 10px;
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #D4AF37;
      word-break: break-all;
      user-select: all;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-row button {
      flex: 1;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn {
      background: #1F1F1F;
      color: #A0A0A0;
      border: 1px solid #2A2A2A !important;
    }
    .copy-btn:hover { color: #fff; border-color: #D4AF37 !important; }
    .open-btn {
      background: #22C55E;
      color: #000;
    }
    .open-btn:hover { background: #16A34A; }
    .steps {
      margin-top: 20px;
      text-align: left;
      font-size: 13px;
      color: #A0A0A0;
      line-height: 1.8;
    }
    .steps strong { color: #fff; }
    a { color: #D4AF37; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .or-divider {
      font-size: 11px;
      color: #666;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Activate STREETS License</h1>
    <p class="subtitle">Enter the email you used at checkout to retrieve your license key.</p>

    <form id="activate-form" onsubmit="return handleSubmit(event)">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
      <button type="submit" class="btn btn-primary" id="submit-btn">Retrieve License Key</button>
    </form>

    <div id="result" style="display:none;"></div>

    <div class="steps">
      <p><strong>How to activate:</strong></p>
      <p>1. Retrieve your key above</p>
      <p>2. Click "Open in 4DA" to activate instantly</p>
      <p>3. Or copy the key and paste it in 4DA Settings</p>
      <p style="margin-top: 12px;"><a href="/streets">Back to STREETS</a></p>
    </div>
  </div>

  <script>
    // Store the current license key for deep-link use
    var currentLicenseKey = null;

    function showLicense(data) {
      currentLicenseKey = data.license_key;
      var result = document.getElementById('result');
      result.className = 'result success';
      result.innerHTML =
        '<p>License found! Tier: <strong></strong></p>' +
        '<code class="license-key"></code>' +
        '<div class="btn-row">' +
          '<button class="open-btn" onclick="openInApp()">Open in 4DA</button>' +
          '<button class="copy-btn" onclick="copyKey()">Copy Key</button>' +
        '</div>' +
        '<p class="or-divider">The button above will open 4DA and activate your license automatically.</p>';
      result.querySelector('strong').textContent = data.tier;
      result.querySelector('.license-key').textContent = data.license_key;
      result.style.display = 'block';
    }

    function showError(msg) {
      var result = document.getElementById('result');
      result.className = 'result error';
      result.innerHTML = '<p></p>';
      result.querySelector('p').textContent = msg;
      result.style.display = 'block';
    }

    function openInApp() {
      if (!currentLicenseKey) return;
      // Deep-link: opens 4DA and auto-activates the license
      var deepLink = '4da://activate?key=' + encodeURIComponent(currentLicenseKey);
      window.location.href = deepLink;
    }

    function copyKey() {
      var key = document.querySelector('.license-key');
      if (key) {
        navigator.clipboard.writeText(key.textContent).then(function() {
          var btn = document.querySelector('.copy-btn');
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy Key'; }, 2000);
        });
      }
    }

    async function fetchLicense(query) {
      var resp = await fetch('/api/streets/activate?' + query);
      var data = await resp.json();
      if (resp.ok && data.license_key) {
        showLicense(data);
        return true;
      } else {
        showError(data.error || 'No license found.');
        return false;
      }
    }

    async function handleSubmit(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var btn = document.getElementById('submit-btn');

      if (!email) return false;

      btn.disabled = true;
      btn.textContent = 'Retrieving...';
      document.getElementById('result').style.display = 'none';

      try {
        await fetchLicense('email=' + encodeURIComponent(email));
      } catch (err) {
        showError('Network error. Please try again.');
      }

      btn.disabled = false;
      btn.textContent = 'Retrieve License Key';
      return false;
    }

    // Auto-retrieve license if arriving from Stripe checkout (session_id in URL)
    (function() {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      if (sessionId) {
        document.querySelector('.subtitle').textContent = 'Retrieving your license...';
        fetchLicense('session_id=' + encodeURIComponent(sessionId)).then(function(ok) {
          if (ok) {
            document.querySelector('.subtitle').textContent = 'Your license key is ready. Click "Open in 4DA" to activate instantly.';
          } else {
            document.querySelector('.subtitle').textContent = 'Could not auto-retrieve. Enter your email below.';
          }
        }).catch(function() {
          document.querySelector('.subtitle').textContent = 'Could not auto-retrieve. Enter your email below.';
        });
      }
    })();
  </script>
</body>
</html>
