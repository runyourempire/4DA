<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <!-- "For the Streets" — Bold back print statement piece. -->
  <!-- Vertical typography layout, oversized. -->
  <rect width="500" height="600" fill="#0A0A0A"/>
  <!-- Main statement -->
  <text x="250" y="120" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666" text-transform="uppercase">YOUR RIG</text>
  <text x="250" y="155" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666" text-transform="uppercase">YOUR RULES</text>
  <text x="250" y="190" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666" text-transform="uppercase">YOUR REVENUE</text>
  <!-- Divider -->
  <line x1="150" y1="220" x2="350" y2="220" stroke="#F97316" stroke-width="2"/>
  <!-- FOR THE -->
  <text x="250" y="310" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" letter-spacing="12" fill="#A0A0A0">FOR THE</text>
  <!-- STREETS (hero text) -->
  <text x="250" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="88" font-weight="600" letter-spacing="6" fill="#FFFFFF">STREETS</text>
  <!-- Accent bar -->
  <rect x="170" y="420" width="160" height="3" fill="#F97316"/>
  <!-- The 8 engines tagline -->
  <text x="250" y="475" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#666666">8 ENGINES . 7 MODULES . $0</text>
  <!-- Sun icon + 4DA mark -->
  <circle cx="230" cy="530" r="12" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <text x="230" y="535" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#D4AF37">4</text>
  <text x="265" y="535" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#666666">4DA.AI</text>
</svg>