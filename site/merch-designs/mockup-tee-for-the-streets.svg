<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500">
  <rect width="420" height="500" fill="#0A0A0A"/>
  <!-- T-shirt silhouette (BACK VIEW - smooth neckline, no collar V) -->
  <path d="M168,75 C168,60 185,50 210,50 C235,50 252,60 252,75 L300,75 L355,105 L355,200 C355,203 353,205 350,205 L300,185 L300,435 C300,442 295,447 288,447 L132,447 C125,447 120,442 120,435 L120,185 L70,205 C67,205 65,203 65,200 L65,105 L120,75 Z" fill="#1C1C1C"/>
  <!-- Back neckline (smooth, no V-collar) -->
  <path d="M172,77 C178,68 192,63 210,63 C228,63 242,68 248,77" fill="none" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <!-- Shoulder seams -->
  <line x1="120" y1="75" x2="168" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <line x1="252" y1="75" x2="300" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <!-- Sleeve hems -->
  <line x1="65" y1="198" x2="120" y2="183" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="183" x2="355" y2="198" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom hem -->
  <line x1="132" y1="445" x2="288" y2="445" stroke="#232323" stroke-width="0.5" opacity="0.4"/>
  <!-- Neck label tag -->
  <rect x="200" y="68" width="20" height="12" rx="1" fill="#232323" stroke="#2A2A2A" stroke-width="0.5"/>
  <text x="210" y="77" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" font-weight="600" fill="#666666">4DA</text>

  <!-- DESIGN: For the Streets - back print -->
  <g transform="translate(65,90) scale(0.30)">
    <text x="250" y="120" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666">YOUR RIG</text>
    <text x="250" y="155" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666">YOUR RULES</text>
    <text x="250" y="190" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" letter-spacing="6" fill="#666666">YOUR REVENUE</text>
    <line x1="150" y1="220" x2="350" y2="220" stroke="#F97316" stroke-width="2"/>
    <text x="250" y="310" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" letter-spacing="12" fill="#A0A0A0">FOR THE</text>
    <text x="250" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="88" font-weight="600" letter-spacing="6" fill="#FFFFFF">STREETS</text>
    <rect x="170" y="420" width="160" height="3" fill="#F97316"/>
    <text x="250" y="475" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#666666">8 ENGINES . 7 MODULES . $0</text>
  </g>
</svg>