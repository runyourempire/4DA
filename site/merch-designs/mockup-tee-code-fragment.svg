      <text x="48" y="425" fill="#333333">17</text>
      <text x="80" y="105" fill="#F97316">/// Score what matters. Ignore the noise.</text>
      <text x="80" y="125" fill="#D4AF37">pub fn</text><text x="130" y="125" fill="#FFFFFF"> score_relevance(</text>
      <text x="80" y="145" fill="#A0A0A0">    item: </text><text x="145" y="145" fill="#D4AF37">&amp;ContentItem</text><text x="280" y="145" fill="#A0A0A0">,</text>
      <text x="80" y="165" fill="#A0A0A0">    context: </text><text x="165" y="165" fill="#D4AF37">&amp;DevContext</text><text x="290" y="165" fill="#A0A0A0">,</text>
      <text x="80" y="185" fill="#A0A0A0">) -> </text><text x="120" y="185" fill="#D4AF37">f64</text><text x="155" y="185" fill="#A0A0A0"> {</text>
      <text x="80" y="205" fill="#A0A0A0">    </text><text x="95" y="205" fill="#D4AF37">let</text><text x="125" y="205" fill="#FFFFFF"> stack = context.detect_stack();</text>
      <text x="80" y="225" fill="#A0A0A0">    </text><text x="95" y="225" fill="#D4AF37">let</text><text x="125" y="225" fill="#FFFFFF"> signal = item.extract_signal();</text>
      <text x="80" y="245" fill="#A0A0A0">    </text><text x="95" y="245" fill="#D4AF37">let</text><text x="125" y="245" fill="#FFFFFF"> confidence = pasifa(</text>
      <text x="80" y="265" fill="#FFFFFF">        stack, signal, context</text>
      <text x="80" y="285" fill="#FFFFFF">    );</text>
      <text x="80" y="305" fill="#A0A0A0"> </text>
      <text x="80" y="325" fill="#F97316">    // Privacy first. Always.</text>
      <text x="80" y="345" fill="#A0A0A0">    </text><text x="95" y="345" fill="#D4AF37">assert!</text><text x="155" y="345" fill="#A0A0A0">(</text><text x="165" y="345" fill="#FFFFFF">data.stays_local()</text><text x="340" y="345" fill="#A0A0A0">);</text>
      <text x="80" y="365" fill="#A0A0A0"> </text>
      <text x="80" y="385" fill="#A0A0A0">    confidence.</text><text x="180" y="385" fill="#FFFFFF">score</text>
      <text x="80" y="405" fill="#A0A0A0">}</text>
