<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <filter id="cap4da-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="cap4da-crown" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="cap4da-brim" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="350" fill="#0A0A0A"/>

  <g filter="url(#cap4da-shadow)">
    <!-- Cap crown (6-panel unstructured, 3/4 view) -->
    <!-- Back panels -->
    <path d="
      M 240 85
      Q 260 70 270 80
      Q 290 95 295 130
      L 290 165
      Q 260 160 240 165
      Z
    " fill="#191919"/>

    <!-- Side panel right -->
    <path d="
      M 240 85
      Q 240 165 240 165
      L 195 170
      Q 185 100 200 78
      Q 218 68 240 85
      Z
    " fill="#1C1C1C"/>

    <!-- Front panel (main visible) -->
    <path d="
      M 200 78
      Q 185 100 185 140
      L 185 170
      L 110 175
      Q 100 140 105 110
      Q 115 72 150 62
      Q 175 56 200 78
      Z
    " fill="url(#cap4da-crown)"/>

    <!-- Side panel left -->
    <path d="
      M 150 62
      Q 115 72 105 110
      L 100 140
      Q 95 160 92 170
      L 80 165
      Q 75 130 82 100
      Q 95 68 130 58
      Q 140 56 150 62
      Z
    " fill="#191919"/>

    <!-- Top button -->
    <circle cx="200" cy="65" r="4" fill="#252525" stroke="#2A2A2A" stroke-width="0.5"/>

    <!-- Panel seam lines -->
    <path d="M 200 65 L 200 78 Q 185 100 185 170" stroke="#282828" stroke-width="0.8" fill="none"/>
    <path d="M 200 65 L 240 85 Q 240 120 240 165" stroke="#282828" stroke-width="0.8" fill="none"/>
    <path d="M 200 65 L 150 62 Q 115 72 105 110" stroke="#282828" stroke-width="0.6" fill="none"/>

    <!-- Curved brim -->
    <path d="
      M 80 165
      Q 75 170 60 185
      Q 50 195 55 205
      Q 60 215 80 218
      L 170 225
      Q 200 227 230 222
      Q 250 218 260 210
      Q 268 200 260 185
      Q 255 175 248 168
      L 240 165
      Q 200 172 110 175
      L 92 170
      Z
    " fill="url(#cap4da-brim)"/>

    <!-- Brim edge highlight -->
    <path d="
      M 60 185 Q 50 195 55 205 Q 60 215 80 218 L 170 225 Q 200 227 230 222 Q 250 218 260 210 Q 268 200 260 185
    " stroke="#282828" stroke-width="0.8" fill="none"/>

    <!-- Brim curve stitching -->
    <path d="
      M 68 190 Q 58 200 63 210 Q 68 217 85 220 L 170 226 Q 200 228 228 223 Q 248 219 256 212 Q 263 203 256 190
    " stroke="#282828" stroke-width="0.5" stroke-dasharray="3 2" fill="none"/>

    <!-- Brim underside line -->
    <path d="M 92 170 Q 140 177 240 165" stroke="#252525" stroke-width="0.6" fill="none"/>

    <!-- Adjustable strap (back) -->
    <path d="
      M 270 130
      Q 285 135 290 150
      L 292 160
    " stroke="#282828" stroke-width="1.5" fill="none"/>
    <!-- Metal clasp -->
    <rect x="286" y="145" width="8" height="5" rx="1" fill="#333333" stroke="#3A3A3A" stroke-width="0.5"/>

    <!-- Sweatband line -->
    <path d="M 85 168 Q 150 175 240 165" stroke="#252525" stroke-width="1.2" fill="none"/>

    <!-- 4DA embroidered text on front panel -->
    <text x="155" y="140" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="-1" fill="#FFFFFF">4DA</text>

    <!-- Embroidery stitch simulation -->
    <text x="155" y="140" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="-1" fill="none" stroke="#FFFFFF" stroke-width="0.3" stroke-dasharray="1.5 0.8">4DA</text>
  </g>

  <!-- Product label -->
  <text x="200" y="310" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2" fill="#666666">4DA DAD CAP</text>
</svg>