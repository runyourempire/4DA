<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" fill="none">
  <defs>
    <filter id="pin-card-shadow" x="-5%" y="-3%" width="112%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="pin-shadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="pin-sun" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="65%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </radialGradient>
    <linearGradient id="pin-gold-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5C853"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#B8972E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="pin-card-bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="350" fill="#0A0A0A"/>

  <!-- Backing card -->
  <g filter="url(#pin-card-shadow)">
    <rect x="55" y="35" width="190" height="270" rx="10" fill="url(#pin-card-bg)"/>
    <!-- Card border -->
    <rect x="55" y="35" width="190" height="270" rx="10" fill="none" stroke="#232323" stroke-width="0.8"/>

    <!-- Card texture (subtle diagonal lines) -->
    <line x1="60" y1="60" x2="240" y2="60" stroke="#1A1A1A" stroke-width="0.3"/>
    <line x1="60" y1="295" x2="240" y2="295" stroke="#1A1A1A" stroke-width="0.3"/>

    <!-- Hanging hole -->
    <circle cx="150" cy="52" r="5" fill="#0A0A0A" stroke="#232323" stroke-width="0.5"/>

    <!-- Card brand text -->
    <text x="150" y="78" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="8" letter-spacing="3" fill="#444444">4DA ENAMEL PIN</text>

    <!-- === The Enamel Pin === -->
    <g filter="url(#pin-shadow)" transform="translate(150, 165)">
      <!-- Gold plated border ring (outer) -->
      <circle cx="0" cy="0" r="56" fill="url(#pin-gold-border)"/>

      <!-- Pin face -->
      <circle cx="0" cy="0" r="52" fill="#141414"/>

      <!-- Sun rays (radial lines from center) -->
      <g opacity="0.4">
        <line x1="0" y1="-48" x2="0" y2="-35" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
        <line x1="24" y1="-42" x2="18" y2="-31" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="42" y1="-24" x2="31" y2="-18" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="48" y1="0" x2="35" y2="0" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
        <line x1="42" y1="24" x2="31" y2="18" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="24" y1="42" x2="18" y2="31" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="0" y1="48" x2="0" y2="35" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
        <line x1="-24" y1="42" x2="-18" y2="31" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-42" y1="24" x2="-31" y2="18" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-48" y1="0" x2="-35" y2="0" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
        <line x1="-42" y1="-24" x2="-31" y2="-18" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-24" y1="-42" x2="-18" y2="-31" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
      </g>

      <!-- Sun core circles -->
      <circle cx="0" cy="0" r="26" fill="url(#pin-sun)" opacity="0.9"/>
      <circle cx="0" cy="0" r="20" fill="#F59E0B"/>
      <circle cx="0" cy="0" r="14" fill="#FBBF24"/>

      <!-- Inner gold ring detail -->
      <circle cx="0" cy="0" r="52" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.5"/>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#B8972E" stroke-width="0.3" opacity="0.4"/>

      <!-- "4" in center -->
      <text x="0" y="7" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">4</text>

      <!-- Metallic sheen highlight (arc) -->
      <path d="M -30 -40 Q 0 -50 30 -40" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.15"/>
    </g>

    <!-- Butterfly clutch posts (behind pin, visible at edges) -->
    <circle cx="135" cy="225" r="3" fill="#333333" stroke="#444444" stroke-width="0.5"/>
    <circle cx="165" cy="225" r="3" fill="#333333" stroke="#444444" stroke-width="0.5"/>
    <!-- Clutch backs (small rectangles) -->
    <rect x="132" y="227" width="6" height="8" rx="1" fill="#2A2A2A"/>
    <rect x="162" y="227" width="6" height="8" rx="1" fill="#2A2A2A"/>

    <!-- Card bottom text -->
    <text x="150" y="272" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="1" fill="#FFFFFF">4DA</text>
    <text x="150" y="286" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="6" letter-spacing="2" fill="#666666">SOLAR CROWN</text>
  </g>

  <!-- Product label -->
  <text x="150" y="332" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2" fill="#666666">SOLAR CROWN ENAMEL PIN</text>
</svg>