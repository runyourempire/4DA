<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" fill="none">
  <defs>
    <filter id="hoodiestreets-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="hoodiestreets-body" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="hoodiestreets-hood" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="520" fill="#0A0A0A"/>

  <!-- Hoodie body -->
  <g filter="url(#hoodiestreets-shadow)">
    <!-- Main body -->
    <path d="
      M 110 170
      L 70 180
      L 55 310
      L 65 320
      L 75 320
      Q 80 290 85 290
      L 85 430
      Q 85 445 100 448
      L 210 455
      L 320 448
      Q 335 445 335 430
      L 335 290
      Q 340 290 345 320
      L 355 320
      L 365 310
      L 350 180
      L 310 170
      Z
    " fill="url(#hoodiestreets-body)"/>

    <!-- Hood interior -->
    <path d="
      M 140 170
      Q 140 100 170 75
      Q 195 58 210 55
      Q 225 58 250 75
      Q 280 100 280 170
      Z
    " fill="url(#hoodiestreets-hood)"/>

    <!-- Hood outer left -->
    <path d="
      M 110 170
      Q 105 130 125 90
      Q 145 55 175 45
      Q 190 40 210 38
      L 210 55
      Q 195 58 170 75
      Q 140 100 140 170
      Z
    " fill="#1C1C1C"/>

    <!-- Hood outer right -->
    <path d="
      M 310 170
      Q 315 130 295 90
      Q 275 55 245 45
      Q 230 40 210 38
      L 210 55
      Q 225 58 250 75
      Q 280 100 280 170
      Z
    " fill="#1C1C1C"/>

    <!-- Left sleeve -->
    <path d="
      M 110 170
      L 70 180
      L 55 310
      L 65 320
      L 75 320
      Q 80 290 85 285
      L 85 170
      Z
    " fill="#1C1C1C"/>

    <!-- Right sleeve -->
    <path d="
      M 310 170
      L 350 180
      L 365 310
      L 355 320
      L 345 320
      Q 340 290 335 285
      L 335 170
      Z
    " fill="#1C1C1C"/>

    <!-- Hood seam line -->
    <path d="M 110 170 Q 140 165 210 162 Q 280 165 310 170" stroke="#282828" stroke-width="1" fill="none"/>

    <!-- Hood center seam -->
    <line x1="210" y1="38" x2="210" y2="162" stroke="#232323" stroke-width="0.8"/>

    <!-- Shoulder seams -->
    <line x1="110" y1="170" x2="85" y2="175" stroke="#282828" stroke-width="0.8"/>
    <line x1="310" y1="170" x2="335" y2="175" stroke="#282828" stroke-width="0.8"/>

    <!-- Drawstrings -->
    <line x1="190" y1="162" x2="185" y2="230" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="230" y1="162" x2="235" y2="230" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="183" y1="228" x2="187" y2="235" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="233" y1="228" x2="237" y2="235" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Kangaroo pocket -->
    <path d="
      M 140 340
      Q 140 330 155 328
      L 265 328
      Q 280 330 280 340
      L 280 395
      Q 280 405 270 408
      L 150 408
      Q 140 405 140 395
      Z
    " fill="none" stroke="#282828" stroke-width="1"/>
    <path d="M 155 365 Q 210 370 265 365" stroke="#252525" stroke-width="0.8" fill="none"/>

    <!-- Ribbed cuff left -->
    <g>
      <line x1="58" y1="312" x2="73" y2="318" stroke="#252525" stroke-width="0.5"/>
      <line x1="58" y1="315" x2="73" y2="321" stroke="#252525" stroke-width="0.5"/>
      <line x1="58" y1="318" x2="73" y2="324" stroke="#252525" stroke-width="0.5"/>
    </g>

    <!-- Ribbed cuff right -->
    <g>
      <line x1="347" y1="312" x2="362" y2="318" stroke="#252525" stroke-width="0.5"/>
      <line x1="347" y1="315" x2="362" y2="321" stroke="#252525" stroke-width="0.5"/>
      <line x1="347" y1="318" x2="362" y2="324" stroke="#252525" stroke-width="0.5"/>
    </g>

    <!-- Ribbed hem -->
    <g>
      <path d="M 100 445 Q 210 455 320 445" stroke="#252525" stroke-width="0.5" fill="none"/>
      <path d="M 100 448 Q 210 458 320 448" stroke="#252525" stroke-width="0.5" fill="none"/>
      <path d="M 100 451 Q 210 461 320 451" stroke="#252525" stroke-width="0.5" fill="none"/>
    </g>

    <!-- STREETS wordmark on chest -->
    <text x="210" y="260" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="600" letter-spacing="6" fill="#FFFFFF">STREETS</text>
    <text x="210" y="278" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" letter-spacing="3" fill="#F97316">THE DEVELOPER INCOME PLAYBOOK</text>

    <!-- Back print indicator (upper back, subtle) -->
    <g opacity="0.35">
      <text x="210" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" letter-spacing="2" fill="#A0A0A0">8 ENGINES</text>
      <text x="210" y="194" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="5" fill="#666666">BACK PRINT</text>
    </g>
  </g>

  <!-- Product label -->
  <text x="210" y="495" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2" fill="#666666">STREETS HEAVYWEIGHT HOODIE</text>
</svg>