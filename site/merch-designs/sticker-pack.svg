<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Sticker Pack Preview — Shows all sticker designs in one sheet. -->
  <!-- Individual stickers would be cut from this. -->
  <rect width="800" height="300" fill="#1A1A1A"/>
  <!-- Sticker 1: 4DA Circle Badge -->
  <g transform="translate(80, 150)">
    <circle r="55" fill="#0A0A0A" stroke="#D4AF37" stroke-width="2"/>
    <text y="-5" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#FFFFFF">4DA</text>
    <text y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" letter-spacing="1" fill="#D4AF37">AUTONOMY</text>
  </g>
  <!-- Sticker 2: Void Pulse Mini -->
  <g transform="translate(220, 150)">
    <circle r="55" fill="#0A0A0A" stroke="#8C470F" stroke-width="2"/>
    <circle r="30" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
    <circle r="20" fill="none" stroke="#FFD14D" stroke-width="1" opacity="0.7"/>
    <circle r="8" fill="#FFD14D"/>
    <text y="48" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7" fill="#666666">VOID ENGINE</text>
  </g>
  <!-- Sticker 3: "Privacy First" rectangle -->
  <g transform="translate(360, 150)">
    <rect x="-65" y="-25" width="130" height="50" rx="6" fill="#0A0A0A" stroke="#22C55E" stroke-width="1.5"/>
    <text y="-4" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#22C55E">PRIVACY</text>
    <text y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#FFFFFF">FIRST</text>
  </g>
  <!-- Sticker 4: STREETS pill -->
  <g transform="translate(510, 150)">
    <rect x="-60" y="-22" width="120" height="44" rx="22" fill="#F97316"/>
    <text y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" letter-spacing="3" fill="#0A0A0A">STREETS</text>
  </g>
  <!-- Sticker 5: "assert!(data.stays_local())" -->
  <g transform="translate(680, 150)">
    <rect x="-80" y="-20" width="160" height="40" rx="6" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
    <text y="5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D4AF37">assert!</text><text x="28" y="5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#A0A0A0">(data.</text><text x="62" y="5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#FFFFFF">stays_local</text><text x="110" y="5" font-family="'JetBrains Mono', monospace" font-size="10" fill="#A0A0A0">())</text>
  </g>
  <!-- Labels -->
  <text x="400" y="25" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#666666">4DA STICKER PACK</text>
  <text x="400" y="280" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#333333">DIE-CUT VINYL . WATERPROOF . LAPTOP-READY</text>
</svg>