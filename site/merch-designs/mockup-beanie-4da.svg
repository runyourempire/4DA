<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 400" fill="none">
  <defs>
    <filter id="beanie-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="beanie-body" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="beanie-cuff" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#191919"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="380" height="400" fill="#0A0A0A"/>

  <g filter="url(#beanie-shadow)">
    <!-- Main beanie crown (dome shape with slight slouch) -->
    <path d="
      M 90 230
      Q 85 200 88 165
      Q 92 125 110 95
      Q 135 60 165 48
      Q 190 40 210 42
      Q 240 46 260 62
      Q 285 82 295 110
      Q 305 140 305 175
      Q 308 210 300 230
      Z
    " fill="url(#beanie-body)"/>

    <!-- Crown top detail (slight point/gather) -->
    <path d="
      M 175 48
      Q 188 38 195 36
      Q 202 38 215 48
    " stroke="#282828" stroke-width="0.8" fill="none"/>

    <!-- Knit texture lines on crown (vertical ribs) -->
    <path d="M 120 230 Q 118 160 130 90" stroke="#232323" stroke-width="0.4" opacity="0.6"/>
    <path d="M 150 230 Q 148 145 155 68" stroke="#232323" stroke-width="0.4" opacity="0.6"/>
    <path d="M 180 230 Q 178 140 183 50" stroke="#232323" stroke-width="0.4" opacity="0.6"/>
    <path d="M 210 230 Q 210 140 210 50" stroke="#232323" stroke-width="0.4" opacity="0.6"/>
    <path d="M 240 230 Q 242 140 237 58" stroke="#232323" stroke-width="0.4" opacity="0.6"/>
    <path d="M 270 230 Q 274 155 265 78" stroke="#232323" stroke-width="0.4" opacity="0.6"/>

    <!-- Fold-up cuff -->
    <path d="
      M 82 230
      L 82 275
      Q 82 290 100 295
      L 190 300
      L 280 295
      Q 308 290 310 275
      L 310 230
      Q 280 235 190 238
      Q 110 235 82 230
      Z
    " fill="url(#beanie-cuff)"/>

    <!-- Cuff top edge line -->
    <path d="M 82 230 Q 110 235 190 238 Q 280 235 310 230" stroke="#2A2A2A" stroke-width="1" fill="none"/>

    <!-- Ribbed cuff texture (horizontal lines) -->
    <path d="M 84 238 Q 130 243 190 246 Q 270 243 308 238" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 84 244 Q 130 249 190 252 Q 270 249 308 244" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 84 250 Q 130 255 190 258 Q 270 255 308 250" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 83 256 Q 130 261 190 264 Q 270 261 308 256" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 83 262 Q 130 267 190 270 Q 270 267 308 262" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 83 268 Q 130 273 190 276 Q 270 273 308 268" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 84 274 Q 130 279 190 282 Q 270 279 308 274" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 86 280 Q 130 285 190 288 Q 270 285 307 280" stroke="#252525" stroke-width="0.6" fill="none"/>
    <path d="M 90 286 Q 130 291 190 293 Q 270 291 304 286" stroke="#252525" stroke-width="0.6" fill="none"/>

    <!-- Cuff bottom edge -->
    <path d="M 100 295 Q 190 302 280 295" stroke="#282828" stroke-width="0.8" fill="none"/>

    <!-- Vertical rib lines on cuff -->
    <line x1="120" y1="232" x2="118" y2="296" stroke="#232323" stroke-width="0.35" opacity="0.5"/>
    <line x1="150" y1="235" x2="148" y2="298" stroke="#232323" stroke-width="0.35" opacity="0.5"/>
    <line x1="180" y1="237" x2="180" y2="300" stroke="#232323" stroke-width="0.35" opacity="0.5"/>
    <line x1="210" y1="237" x2="212" y2="300" stroke="#232323" stroke-width="0.35" opacity="0.5"/>
    <line x1="240" y1="236" x2="243" y2="298" stroke="#232323" stroke-width="0.35" opacity="0.5"/>
    <line x1="270" y1="234" x2="273" y2="295" stroke="#232323" stroke-width="0.35" opacity="0.5"/>

    <!-- 4DA embroidered on cuff -->
    <text x="195" y="272" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">4DA</text>
    <!-- Embroidery stitch simulation -->
    <text x="195" y="272" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="none" stroke="#FFFFFF" stroke-width="0.25" stroke-dasharray="1.2 0.6">4DA</text>
  </g>

  <!-- Product label -->
  <text x="190" y="365" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2" fill="#666666">4DA EMBROIDERED BEANIE</text>
</svg>