<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500">
  <rect width="420" height="500" fill="#0A0A0A"/>
  <!-- T-shirt silhouette -->
  <path d="M168,75 C168,60 185,50 210,50 C235,50 252,60 252,75 L300,75 L355,105 L355,200 C355,203 353,205 350,205 L300,185 L300,435 C300,442 295,447 288,447 L132,447 C125,447 120,442 120,435 L120,185 L70,205 C67,205 65,203 65,200 L65,105 L120,75 Z" fill="#1C1C1C"/>
  <!-- Collar -->
  <path d="M172,77 C178,63 192,55 210,55 C228,55 242,63 248,77" fill="none" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <!-- Shoulder seams -->
  <line x1="120" y1="75" x2="168" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <line x1="252" y1="75" x2="300" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <!-- Sleeve hems -->
  <line x1="65" y1="198" x2="120" y2="183" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="183" x2="355" y2="198" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom hem -->
  <line x1="132" y1="445" x2="288" y2="445" stroke="#232323" stroke-width="0.5" opacity="0.4"/>

  <!-- DESIGN: Void Pulse - concentric rings with heartbeat line -->
  <defs>
    <linearGradient id="voidpulse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C470F"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FFD14D"/>
    </linearGradient>
    <filter id="voidpulse-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(70,110) scale(0.35)">
    <g filter="url(#voidpulse-glow)" transform="translate(200,200)">
      <circle r="170" fill="none" stroke="#8C470F" stroke-width="0.5" opacity="0.3"/>
      <circle r="150" fill="none" stroke="#8C470F" stroke-width="0.8" opacity="0.4"/>
      <circle r="130" fill="none" stroke="#A0580F" stroke-width="1" opacity="0.5"/>
      <circle r="110" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.6"/>
      <circle r="90" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
      <circle r="70" fill="none" stroke="#FFD14D" stroke-width="2" opacity="0.8"/>
      <circle r="50" fill="none" stroke="#FFD14D" stroke-width="2.5" opacity="0.9"/>
      <circle r="28" fill="#8C470F" opacity="0.8"/>
      <circle r="18" fill="#D4AF37" opacity="0.9"/>
      <circle r="8" fill="#FFD14D"/>
      <line x1="-180" y1="0" x2="-30" y2="0" stroke="#FFD14D" stroke-width="1.5" opacity="0.6"/>
      <polyline points="-30,0 -20,-25 -10,30 0,-15 10,20 20,-10 30,0" fill="none" stroke="#FFD14D" stroke-width="2" opacity="0.9"/>
      <line x1="30" y1="0" x2="180" y2="0" stroke="#FFD14D" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>
</svg>