<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500">
  <rect width="420" height="500" fill="#0A0A0A"/>
  <!-- T-shirt silhouette -->
  <path d="M168,75 C168,60 185,50 210,50 C235,50 252,60 252,75 L300,75 L355,105 L355,200 C355,203 353,205 350,205 L300,185 L300,435 C300,442 295,447 288,447 L132,447 C125,447 120,442 120,435 L120,185 L70,205 C67,205 65,203 65,200 L65,105 L120,75 Z" fill="#1C1C1C"/>
  <!-- Collar -->
  <path d="M172,77 C178,63 192,55 210,55 C228,55 242,63 248,77" fill="none" stroke="#282828" stroke-width="2" stroke-linecap="round"/>
  <!-- Shoulder seams -->
  <line x1="120" y1="75" x2="168" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <line x1="252" y1="75" x2="300" y2="75" stroke="#232323" stroke-width="0.5" opacity="0.6"/>
  <!-- Sleeve hems -->
  <line x1="65" y1="198" x2="120" y2="183" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="183" x2="355" y2="198" stroke="#232323" stroke-width="0.5" opacity="0.3"/>
  <!-- Bottom hem -->
  <line x1="132" y1="445" x2="288" y2="445" stroke="#232323" stroke-width="0.5" opacity="0.4"/>

  <!-- DESIGN: Inferno - blazing solar orb, distinct from Solar Crown -->
  <defs>
    <radialGradient id="inferno-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="8%" stop-color="#FFFBE6"/>
      <stop offset="18%" stop-color="#FFE566"/>
      <stop offset="30%" stop-color="#FFD14D"/>
      <stop offset="45%" stop-color="#FF9500"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="75%" stop-color="#DC2626"/>
      <stop offset="88%" stop-color="#7F1D1D"/>
      <stop offset="100%" stop-color="#1C1C1C"/>
    </radialGradient>
    <radialGradient id="inferno-hotspot" cx="50%" cy="45%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD14D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="inferno-outer-haze" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#DC2626" stop-opacity="0"/>
      <stop offset="80%" stop-color="#7F1D1D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1C1C1C" stop-opacity="0"/>
    </radialGradient>
    <filter id="inferno-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inferno-soft">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Outer heat haze -->
  <circle cx="210" cy="255" r="155" fill="url(#inferno-outer-haze)" opacity="0.5"/>

  <!-- Main orb -->
  <g filter="url(#inferno-glow)">
    <circle cx="210" cy="255" r="130" fill="url(#inferno-core)"/>
  </g>

  <!-- Hot surface detail rings -->
  <circle cx="210" cy="255" r="95" fill="none" stroke="#FF9500" stroke-width="0.8" opacity="0.2"/>
  <circle cx="210" cy="255" r="70" fill="none" stroke="#FFD14D" stroke-width="0.5" opacity="0.25"/>
  <circle cx="210" cy="255" r="45" fill="none" stroke="#FFE566" stroke-width="0.3" opacity="0.3"/>

  <!-- White-hot center glow -->
  <circle cx="210" cy="248" r="55" fill="url(#inferno-hotspot)"/>

  <!-- Subtle "4" forged into the core -->
  <text x="210" y="280" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="600" fill="#FFFFFF" opacity="0.35" filter="url(#inferno-glow)">4</text>
</svg>