<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAME Component Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #fff; font-family: 'Inter', system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #D4AF37; }
  h2 { font-size: 18px; margin: 32px 0 16px; color: #A0A0A0; border-bottom: 1px solid #2A2A2A; padding-bottom: 8px; }
  .subtitle { color: #787878; margin-bottom: 32px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: #141414; border: 1px solid #2A2A2A; border-radius: 8px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card-preview { width: 100%; height: 200px; position: relative; background: #0A0A0A; }
  .card-preview > * { width: 100% !important; height: 100% !important; display: block !important; }
  .card-info { padding: 12px; border-top: 1px solid #2A2A2A; }
  .card-name { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: #fff; }
  .card-status { font-size: 11px; margin-top: 4px; }
  .status-production { color: #22C55E; }
  .status-registered { color: #D4AF37; }
  .status-demo { color: #787878; }
  .card-error { color: #EF4444; font-size: 11px; margin-top: 4px; }
  .section-count { color: #787878; font-size: 13px; font-weight: normal; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 24px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 4px; border: 1px solid #2A2A2A;
    background: #141414; color: #A0A0A0; cursor: pointer; font-size: 12px;
  }
  .filter-btn.active { border-color: #D4AF37; color: #D4AF37; }
  .filter-btn:hover { border-color: #fff; color: #fff; }
</style>
</head>
<body>

<h1>GAME Component Gallery</h1>
<p class="subtitle">All 75 compiled Web Components — inspect before cleanup</p>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all')">All (75)</button>
  <button class="filter-btn" onclick="filter('production')">Production (10)</button>
  <button class="filter-btn" onclick="filter('registered')">Registered Only (5)</button>
  <button class="filter-btn" onclick="filter('demo')">Demo/Unused (60)</button>
</div>

<div id="gallery"></div>

<script>
// Components actively used in UI
const PRODUCTION = [
  'ambient-intelligence', 'scan-ring', 'signal-waveform', 'status-orb',
  'boot-ring', 'decision-countdown', 'source-vitals', 'briefing-atmosphere',
  'playbook-pathway', 'radar-field'
];

// In registry but not used in any UI component
const REGISTERED_ONLY = [
  'celebration-burst', 'engagement-bars', 'achievement-progress',
  'score-fingerprint', 'knowledge-depth'
];

// All demo/experimental (not in registry at all)
const DEMO = [
  'arc-demo', 'audio-reactive', 'badge', 'black-hole', 'boolean-demo',
  'capsule-indicator', 'cast-demo', 'chaos-wind', 'child', 'cookie',
  'cosmos', 'crystal-vortex', 'crystal', 'dawn', 'day-cycle', 'dot-grid',
  'dusk', 'feedback-trails', 'genesis', 'glowing-cross', 'hello-glow',
  'hollow-star', 'labyrinth', 'living-field', 'living-mandala', 'mandala',
  'mirror-star', 'mitosis', 'mycelium', 'n-body', 'neon-cells', 'neon-heart',
  'noon', 'onion-rings', 'organic-flow', 'organism', 'physarum-network',
  'physarum-veins', 'polar-rings', 'reaction-field', 'resonance-demo',
  'rounded-box', 'scored-viz', 'smoke', 'soft-glow', 'status-ring',
  'stellar-wind', 'sunset-orb', 'synesthesia', 'temporal-demo', 'trails',
  'triangle-glow', 'turbulence', 'turing-crystal', 'turing-fire',
  'turing-ocean', 'turing-patterns', 'undulate', 'vortex', 'worm-trails'
];

// We need one more: living-field was found but double-check
const ALL = [...PRODUCTION, ...REGISTERED_ONLY, ...DEMO];

function getStatus(name) {
  if (PRODUCTION.includes(name)) return { label: 'PRODUCTION', cls: 'status-production' };
  if (REGISTERED_ONLY.includes(name)) return { label: 'REGISTERED (unused)', cls: 'status-registered' };
  return { label: 'DEMO', cls: 'status-demo' };
}

let loadedScripts = {};

async function loadComponent(name) {
  if (loadedScripts[name]) return;
  loadedScripts[name] = true;
  try {
    const script = document.createElement('script');
    script.src = `./${name}.js`;
    await new Promise((resolve, reject) => {
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  } catch (e) {
    console.warn(`Failed to load ${name}:`, e);
  }
}

async function renderGallery(components) {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  for (const name of components) {
    const status = getStatus(name);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.category = PRODUCTION.includes(name) ? 'production' :
                            REGISTERED_ONLY.includes(name) ? 'registered' : 'demo';

    const preview = document.createElement('div');
    preview.className = 'card-preview';

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `
      <div class="card-name">game-${name}</div>
      <div class="card-status ${status.cls}">${status.label}</div>
    `;

    card.appendChild(preview);
    card.appendChild(info);
    gallery.appendChild(card);

    // Load and mount component
    try {
      await loadComponent(name);
      const tag = `game-${name}`;
      if (customElements.get(tag)) {
        const el = document.createElement(tag);
        el.style.width = '100%';
        el.style.height = '100%';
        el.style.display = 'block';
        preview.appendChild(el);
      } else {
        info.innerHTML += `<div class="card-error">Custom element not defined</div>`;
      }
    } catch (e) {
      info.innerHTML += `<div class="card-error">Load error: ${e.message}</div>`;
    }
  }
}

function filter(category) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  let components;
  switch(category) {
    case 'production': components = PRODUCTION; break;
    case 'registered': components = REGISTERED_ONLY; break;
    case 'demo': components = DEMO; break;
    default: components = ALL;
  }
  renderGallery(components);
}

// Initial render
renderGallery(ALL);
</script>
</body>
</html>
