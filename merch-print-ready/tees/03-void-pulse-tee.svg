<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <!-- Void Pulse Tee — PRINT READY (transparent background) -->
  <!-- Placement: center chest, 8 inches -->
  <!-- Product: Bella+Canvas 3001 Black -->
  <defs>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pulseGlow)" transform="translate(1500,1400)">
    <!-- Concentric pulse rings — stronger contrast, better print visibility -->
    <circle r="1250" fill="none" stroke="#4A2800" stroke-width="6" opacity="0.4"/>
    <circle r="1100" fill="none" stroke="#6B3A00" stroke-width="8" opacity="0.5"/>
    <circle r="950" fill="none" stroke="#8C4F0A" stroke-width="10" opacity="0.55"/>
    <circle r="800" fill="none" stroke="#A0680F" stroke-width="12" opacity="0.65"/>
    <circle r="650" fill="none" stroke="#D4AF37" stroke-width="14" opacity="0.75"/>
    <circle r="500" fill="none" stroke="#D4AF37" stroke-width="18" opacity="0.85"/>
    <circle r="350" fill="none" stroke="#FFD14D" stroke-width="22" opacity="0.9"/>

    <!-- Core ember — stronger for print -->
    <circle r="200" fill="#6B3A00" opacity="0.9"/>
    <circle r="140" fill="#D4AF37"/>
    <circle r="75" fill="#FFD14D"/>
    <circle r="30" fill="#FFFFFF"/>

    <!-- Pulse wave (EKG line) — thicker for print visibility -->
    <line x1="-1300" y1="0" x2="-280" y2="0" stroke="#D4AF37" stroke-width="8" opacity="0.5"/>
    <polyline points="-280,0 -200,-200 -120,260 -40,-140 40,180 120,-90 200,60 280,0"
      fill="none" stroke="#FFD14D" stroke-width="16" stroke-linejoin="round"/>
    <line x1="280" y1="0" x2="1300" y2="0" stroke="#D4AF37" stroke-width="8" opacity="0.5"/>
  </g>

  <!-- Label — positioned below -->
  <text x="1500" y="2800" text-anchor="middle" font-family="'Courier New', monospace" font-size="72" letter-spacing="28" fill="#666666">VOID ENGINE</text>
  <rect x="1100" y="2840" width="800" height="3" fill="#D4AF37" opacity="0.5"/>
</svg>
