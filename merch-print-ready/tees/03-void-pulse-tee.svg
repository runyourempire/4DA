<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <!-- Void Pulse Tee — PRINT READY (transparent background) -->
  <!-- Placement: center chest, 8 inches -->
  <!-- Product: Bella+Canvas 3001 Black -->
  <defs>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#pulseGlow)" transform="translate(1500,1500)">
    <!-- Concentric pulse rings -->
    <circle r="1275" fill="none" stroke="#8C470F" stroke-width="4" opacity="0.3"/>
    <circle r="1125" fill="none" stroke="#8C470F" stroke-width="6" opacity="0.4"/>
    <circle r="975" fill="none" stroke="#A0580F" stroke-width="8" opacity="0.5"/>
    <circle r="825" fill="none" stroke="#D4AF37" stroke-width="9" opacity="0.6"/>
    <circle r="675" fill="none" stroke="#D4AF37" stroke-width="11" opacity="0.7"/>
    <circle r="525" fill="none" stroke="#FFD14D" stroke-width="15" opacity="0.8"/>
    <circle r="375" fill="none" stroke="#FFD14D" stroke-width="18" opacity="0.9"/>
    <!-- Core ember -->
    <circle r="210" fill="#8C470F" opacity="0.8"/>
    <circle r="135" fill="#D4AF37" opacity="0.9"/>
    <circle r="60" fill="#FFD14D"/>
    <!-- Pulse wave (horizontal EKG line) -->
    <line x1="-1350" y1="0" x2="-225" y2="0" stroke="#FFD14D" stroke-width="10" opacity="0.6"/>
    <polyline points="-225,0 -150,-188 -75,225 0,-112 75,150 150,-75 225,0" fill="none" stroke="#FFD14D" stroke-width="14" opacity="0.9"/>
    <line x1="225" y1="0" x2="1350" y2="0" stroke="#FFD14D" stroke-width="10" opacity="0.6"/>
  </g>
  <!-- Label -->
  <text x="1500" y="2850" text-anchor="middle" font-family="'Courier New', monospace" font-size="80" letter-spacing="22" fill="#888888">VOID ENGINE</text>
</svg>