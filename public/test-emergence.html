<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GAME Emergence — Intelligence Visualization</title>
  <script type="module" src="/emergence.js"></script>
  <style>
    * { margin: 0; }
    body { background: #000; overflow: hidden; }
    game-emergence {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .overlay {
      position: fixed;
      bottom: 24px;
      left: 24px;
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <game-emergence metabolism="0.5" signal_count="0" awareness="0.3"></game-emergence>
  <div class="overlay">GAME Emergence — move your mouse</div>
  <script>
    const el = document.querySelector('game-emergence');
    let t = 0;
    setInterval(() => {
      t += 0.016;
      // Simulate live data
      el.signal_count = Math.sin(t * 0.3) * 0.5 + 0.5;
      el.metabolism = 0.3 + Math.sin(t * 0.15) * 0.2;
    }, 16);
  </script>
</body>
</html>
