<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DA Intelligence Briefing</title>
  <link rel="stylesheet" href="/briefing.css">
</head>
<body>
  <div id="briefing" class="briefing-window" role="dialog" aria-label="Intelligence Briefing">
    <!-- GAME atmosphere layer -->
    <div id="game-layer" class="game-layer"></div>

    <!-- Briefing card -->
    <div id="card" class="briefing-card">
      <!-- Header -->
      <div class="briefing-header">
        <div class="header-left">
          <span class="briefing-label">INTELLIGENCE BRIEFING</span>
          <span id="briefing-date" class="briefing-date"></span>
        </div>
        <button id="dismiss-btn" class="dismiss-btn" aria-label="Dismiss briefing">&times;</button>
      </div>

      <!-- Scrollable content area -->
      <div class="briefing-body">
        <!-- Escalating chains -->
        <div id="chains-section" class="section chains-section" style="display:none">
          <div class="section-label section-label--urgent">ESCALATING</div>
          <div id="chains-list" class="chains-list"></div>
        </div>

        <!-- AWE Wisdom signals -->
        <div id="wisdom-section" class="section wisdom-section" style="display:none">
          <div class="section-label section-label--wisdom">WISDOM</div>
          <div id="wisdom-list" class="wisdom-list"></div>
        </div>

        <!-- Top signals -->
        <div id="items-section" class="section items-section">
          <div class="section-label">SIGNALS</div>
          <div id="items-list" class="items-list"></div>
        </div>

        <!-- Knowledge gaps / blind spots -->
        <div id="gaps-section" class="section gaps-section" style="display:none">
          <div class="section-label section-label--caution">BLIND SPOTS</div>
          <div id="gaps-list" class="gaps-list"></div>
        </div>

        <!-- Ongoing topics -->
        <div id="ongoing-section" class="ongoing-section" style="display:none">
          <div id="ongoing-line" class="ongoing-line"></div>
        </div>
      </div>

      <!-- Footer -->
      <div class="briefing-footer">
        <span id="total-count" class="total-count"></span>
        <button id="open-app-btn" class="open-app-btn">Open 4DA</button>
      </div>
    </div>
  </div>

  <script type="module" src="/briefing.js"></script>
</body>
</html>
