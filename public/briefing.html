<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DA Intelligence Briefing</title>
  <link rel="stylesheet" href="/briefing.css">
</head>
<body>
  <div id="briefing" class="briefing-window" role="dialog" aria-label="Intelligence Briefing">
    <!-- Atmosphere layer -->
    <div id="atmosphere-layer" class="atmosphere-layer"></div>

    <!-- Briefing card -->
    <div id="card" class="briefing-card">
      <!-- Header -->
      <div class="briefing-header">
        <div class="header-left">
          <span class="briefing-label" id="label-header">INTELLIGENCE BRIEFING</span>
          <span id="briefing-date" class="briefing-date"></span>
        </div>
        <button id="dismiss-btn" class="dismiss-btn" aria-label="Dismiss briefing">&times;</button>
      </div>

      <!-- Data staleness indicator -->
      <div id="staleness-bar" class="staleness-bar" style="display:none">
        <span id="staleness-text" class="staleness-text"></span>
      </div>

      <!-- Scrollable content area -->
      <div class="briefing-body">
        <!-- First-briefing personalization context line -->
        <div id="personalization-section" class="section personalization-section" style="display:none">
          <div id="personalization-text" class="personalization-text"></div>
        </div>

        <!-- LLM Synthesis — the hero. Gets the most visual real estate. -->
        <div id="synthesis-section" class="section synthesis-section" style="display:none">
          <div id="synthesis-text" class="synthesis-text"></div>
          <div id="synthesis-provenance" class="synthesis-provenance" style="display:none"></div>
        </div>

        <!-- Synthesis unavailable hint -->
        <div id="synthesis-hint-section" class="section synthesis-hint-section" style="display:none">
          <div id="synthesis-hint-text" class="synthesis-hint-text"></div>
        </div>

        <!-- Preemption alerts (critical/high urgency) -->
        <div id="preemption-section" class="section preemption-section" style="display:none">
          <div class="section-label section-label--critical" id="label-preemption">PREEMPTION</div>
          <div id="preemption-list" class="preemption-list"></div>
        </div>

        <!-- Escalating chains -->
        <div id="chains-section" class="section chains-section" style="display:none">
          <div class="section-label section-label--urgent" id="label-escalating">ESCALATING</div>
          <div id="chains-list" class="chains-list"></div>
        </div>

        <!-- Source signals — compact reference list -->
        <div id="items-section" class="section items-section">
          <div class="section-label" id="label-signals">TODAY'S SIGNALS</div>
          <div id="items-list" class="items-list"></div>
        </div>
      </div>

      <!-- Freshness provenance — pinned above the footer, on every brief.
           The visible proof the data is live: "Scanned N · X/Y sources · Zm ago". -->
      <div id="freshness-section" class="freshness-section" style="display:none">
        <span id="freshness-line" class="freshness-line"></span>
      </div>

      <!-- Footer -->
      <div class="briefing-footer">
        <span></span>
        <button id="open-app-btn" class="open-app-btn">Open 4DA</button>
      </div>
    </div>
  </div>

  <script type="module" src="/briefing.js"></script>
</body>
</html>
