# FUNDING.yml — 4DA
#
# Controls the "Sponsor" button GitHub renders on the repo's front page
# and on author avatars. Each key below is a platform; uncomment and
# fill in only those we actively use.
#
# The canonical way to support 4DA is by purchasing a Signal-tier license
# at https://4da.ai/pricing — that's the `custom:` entry below. GitHub
# Sponsors is left commented until/unless the profile is enabled, to
# avoid linking users to a dead page.

# github: runyourempire        # Enable once a GitHub Sponsors profile exists.
# patreon: <name>
# open_collective: <name>
# ko_fi: <name>
# tidelift: <platform-name>/<package-name>
# community_bridge: <project-name>
# liberapay: <name>
# issuehunt: <name>
# otechie: <name>
# lfx_crowdfunding: <project-name>

custom: ["https://4da.ai/pricing"]
