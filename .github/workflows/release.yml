name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.version }}`,
              name: `4DA v${{ steps.version.outputs.version }}`,
              body: `## Download\n\nPick the installer for your platform below.\n\n| Platform | File |\n|----------|------|\n| Windows | \`.exe\` (NSIS installer) |\n| macOS | \`.dmg\` |\n| Linux | \`.AppImage\` or \`.deb\` |\n\n---\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`,
              draft: true,
              prerelease: false,
            })
            return data.id

  build-tauri:
    name: Build (${{ matrix.label }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - label: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
          - label: macOS (Intel)
            runner: macos-14
            target: x86_64-apple-darwin
          - label: Linux
            # ubuntu-22.04 is the minimum — Tauri 2.0 requires libwebkit2gtk-4.1-dev
            # which is NOT available on ubuntu-20.04 (only has webkit2gtk 4.0)
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
        with:
          workspaces: src-tauri

      - name: Ensure cross-compilation target is installed
        shell: bash
        run: |
          # The project pins a specific Rust toolchain via src-tauri/rust-toolchain.toml.
          # Running from src-tauri/ ensures rustup installs the target on THAT toolchain
          # (not the 'stable' one from dtolnay/rust-toolchain).
          cd src-tauri && rustup target add ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Download OCR models
        shell: bash
        run: |
          mkdir -p src-tauri/models
          curl -sSL -o src-tauri/models/text-detection.rten \
            https://ocrs-models.s3-accelerate.amazonaws.com/text-detection.rten
          curl -sSL -o src-tauri/models/text-recognition.rten \
            https://ocrs-models.s3-accelerate.amazonaws.com/text-recognition.rten
          ls -lh src-tauri/models/

      - name: Build AWE sidecar
        shell: bash
        run: |
          # Clone and build the AWE (Artificial Wisdom Engine) binary.
          # AWE is placed next to the Tauri executable so find_awe_binary()
          # resolves it via sibling-of-exe (Priority 2).
          #
          # SUPPLY-CHAIN PIN: the AWE sidecar is pinned by commit SHA. The
          # AWE repo (runyourempire/awe) has no tags at time of pinning, so
          # a SHA is the only stable anchor — tags are trivially movable by
          # upstream and branches float with every push. Do NOT change this
          # to a floating branch (main/master) — that undoes the pin and
          # lets upstream compromises reach 4DA release artifacts.
          #
          # Pinned commit: f803c15befba6fbcd4d9cb1f12f33365a8087244 (main HEAD
          # as of 2026-04-19). Bump this per 4DA release after auditing the
          # AWE changelog + any new deps it pulls in.
          AWE_PINNED_SHA="f803c15befba6fbcd4d9cb1f12f33365a8087244"
          git clone --filter=blob:none --no-checkout https://github.com/runyourempire/awe.git "$RUNNER_TEMP/awe"
          cd "$RUNNER_TEMP/awe"
          git fetch --depth 1 origin "$AWE_PINNED_SHA"
          git checkout "$AWE_PINNED_SHA"
          cargo build --release -p awe-cli --target ${{ matrix.target }}
          # Copy to where Tauri will bundle it (next to fourda binary)
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            AWE_BIN="target/${{ matrix.target }}/release/awe.exe"
          else
            AWE_BIN="target/${{ matrix.target }}/release/awe"
          fi
          # Store path for post-build copy into bundle
          echo "AWE_SIDECAR=$RUNNER_TEMP/awe/$AWE_BIN" >> $GITHUB_ENV

      - name: Supply chain policy check
        shell: bash
        run: |
          cargo install cargo-deny --locked --quiet 2>/dev/null || true
          cd src-tauri && cargo deny check 2>/dev/null || echo "::warning::cargo-deny check failed — review supply chain"

      - name: Install SSL.com CodeSignTool (Windows EV signing)
        if: runner.os == 'Windows' && env.SSL_COM_CREDENTIAL_ID != ''
        env:
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
        shell: powershell
        run: |
          # Download CodeSignTool for Windows
          $cstUrl = "https://www.ssl.com/download/codesigntool-for-windows/"
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "CodeSignTool"
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile $zipPath -UseBasicParsing

          # SHA-256 verification of the downloaded CodeSignTool archive.
          # TODO: compute the SHA-256 of the current SSL.com CodeSignTool
          # release and replace PLACEHOLDER_SHA256_FILL_IN below. Once set,
          # uncomment the `if` block to enforce it. Leaving verification
          # off is tolerated only because SSL.com publishes the tool over
          # HTTPS without a separate checksum endpoint — pin the hash
          # ourselves and update it whenever we intentionally upgrade.
          $expected = "033b55dcb6a5f64cd9e3893dd960f1d7606e97e57bacdb60bae88720eece0c8b"
          $actual = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "CodeSignTool.zip SHA-256: $actual"
          if ($actual -ne $expected.ToLowerInvariant()) { Write-Error "CodeSignTool SHA-256 mismatch — expected $expected, got $actual"; exit 1 }

          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          # Add to PATH for signCommand
          $cstDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          echo "$($cstDir.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # macOS signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows EV signing via SSL.com eSigner (cloud-based, no PFX needed)
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
          # Explicit — tauri-action generates and merges latest.json across
          # matrix jobs when updater signing is configured. The updater
          # endpoint in tauri.conf.json (releases/latest/download/latest.json)
          # depends on this file existing on every release.
          includeUpdaterJson: true

      - name: Place AWE sidecar in bundle
        shell: bash
        run: |
          # Copy AWE binary next to the Tauri desktop executable.
          # On packaged installs, find_awe_binary() resolves it as exe sibling.
          RELEASE_DIR="src-tauri/target/${{ matrix.target }}/release"
          if [[ -f "$AWE_SIDECAR" ]]; then
            cp "$AWE_SIDECAR" "$RELEASE_DIR/"
            echo "AWE sidecar placed at: $RELEASE_DIR/$(basename $AWE_SIDECAR)"
          else
            echo "::warning::AWE sidecar not found at $AWE_SIDECAR — AWE features will be unavailable"
          fi

      - name: Verify macOS code signature (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -maxdepth 3 | head -1)
          if [[ -n "$APP_PATH" ]]; then
            echo "Verifying code signature for: $APP_PATH"
            codesign --verify --deep --strict "$APP_PATH" 2>&1 || echo "::warning::Code signature verification failed"
            codesign -d --entitlements :- "$APP_PATH" 2>&1 | head -20 || true
          else
            echo "::warning::No .app bundle found for signature verification"
          fi

      - name: Report binary sizes
        shell: bash
        run: |
          echo "## Binary Sizes (${{ matrix.label }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Build CLI binary
        working-directory: src-tauri
        run: cargo build --release --bin 4da --target ${{ matrix.target }}

      - name: Upload CLI binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="src-tauri/target/${{ matrix.target }}/release/4da.exe"
            NAME="4da-cli-${{ matrix.target }}.exe"
          else
            BIN="src-tauri/target/${{ matrix.target }}/release/4da"
            NAME="4da-cli-${{ matrix.target }}"
          fi
          cp "$BIN" "$NAME"
          gh release upload "$TAG" "$NAME" --clobber

      - name: Generate SHA-256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          CHECKSUMS_FILE="SHASUMS256-${{ matrix.target }}.txt"

          # Platform-aware hasher: macOS ships `shasum`, Linux + Windows (git-bash)
          # have `sha256sum`. Both produce identical `<hash>  <file>` output.
          if command -v sha256sum >/dev/null 2>&1; then
            HASHER="sha256sum"
          else
            HASHER="shasum -a 256"
          fi

          > "$CHECKSUMS_FILE"

          # Hash all installer artifacts produced by the Tauri bundler.
          # Ignore update bundles (.tar.gz / .zip with matching .sig) — those are
          # verified by Tauri's updater via the minisign signature, not SHA-256.
          if [[ -d "$BUNDLE_DIR" ]]; then
            find "$BUNDLE_DIR" -type f \( \
              -name "*.exe" -o \
              -name "*.msi" -o \
              -name "*.dmg" -o \
              -name "*.AppImage" -o \
              -name "*.deb" -o \
              -name "*.rpm" \
            \) | while read f; do
              NAME=$(basename "$f")
              HASH_LINE=$($HASHER "$f" | awk '{print $1}')
              echo "${HASH_LINE}  ${NAME}" >> "$CHECKSUMS_FILE"
              # Per-file sidecar — users can run `sha256sum -c <file>.sha256`
              echo "${HASH_LINE}  ${NAME}" > "${f}.sha256"
              gh release upload "$TAG" "${f}.sha256" --clobber
            done
          fi

          # Also hash the CLI binary uploaded earlier in this job.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CLI_NAME="4da-cli-${{ matrix.target }}.exe"
          else
            CLI_NAME="4da-cli-${{ matrix.target }}"
          fi
          if [[ -f "$CLI_NAME" ]]; then
            HASH_LINE=$($HASHER "$CLI_NAME" | awk '{print $1}')
            echo "${HASH_LINE}  ${CLI_NAME}" >> "$CHECKSUMS_FILE"
            echo "${HASH_LINE}  ${CLI_NAME}" > "${CLI_NAME}.sha256"
            gh release upload "$TAG" "${CLI_NAME}.sha256" --clobber
          fi

          # Upload the consolidated per-platform checksum file.
          gh release upload "$TAG" "$CHECKSUMS_FILE" --clobber

          # Mirror to job summary so it's visible in the GitHub Actions UI.
          echo "## SHA-256 Checksums (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$CHECKSUMS_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Rust SBOM
        if: matrix.label == 'Windows'
        shell: bash
        run: |
          # SBOMs are a release-gate artefact — a silent "note" fallback would
          # publish a release with no machine-verifiable dependency inventory.
          # Hard-fail the job if generation breaks, so someone has to look.
          set -e
          cargo install cargo-cyclonedx --locked
          cd src-tauri
          cargo cyclonedx --format json --override-filename bom
          # cargo-cyclonedx emits `bom.json` next to each manifest; move the
          # top-level crate's SBOM to the expected path.
          if [[ -f bom.json ]]; then
            mv bom.json ../sbom-rust.json
          else
            echo "::error::cargo-cyclonedx did not produce bom.json"
            exit 1
          fi

      - name: Generate npm SBOM
        if: matrix.label == 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom-npm.json

      - name: Upload SBOMs
        if: matrix.label == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" sbom-rust.json sbom-npm.json --clobber 2>/dev/null || true

      - name: Install Cosign
        if: matrix.label == 'Windows'
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign SBOMs with Sigstore
        if: matrix.label == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cosign sign-blob --yes --bundle sbom-rust.sig.bundle sbom-rust.json 2>/dev/null || true
          cosign sign-blob --yes --bundle sbom-npm.sig.bundle sbom-npm.json 2>/dev/null || true
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" sbom-rust.sig.bundle sbom-npm.sig.bundle --clobber 2>/dev/null || true

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Consolidate SHA-256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p shasums && cd shasums

          # Download every per-platform SHASUMS256-*.txt produced by the matrix.
          for ASSET in $(gh release view "$TAG" --repo "$GH_REPO" --json assets -q '.assets[].name' | grep '^SHASUMS256-'); do
            gh release download "$TAG" --repo "$GH_REPO" -p "$ASSET" --clobber
          done

          # Produce a single SHASUMS256.txt sorted by filename.
          if ls SHASUMS256-*.txt >/dev/null 2>&1; then
            cat SHASUMS256-*.txt | sort -k2 > SHASUMS256.txt
            echo "Consolidated checksums:"
            cat SHASUMS256.txt
            gh release upload "$TAG" SHASUMS256.txt --repo "$GH_REPO" --clobber
          else
            echo "::warning::No per-platform SHASUMS256 files found — consolidated file not created."
          fi

      - name: Verify release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"

          ASSETS=$(gh release view "$TAG" --repo "$GH_REPO" --json assets -q '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS" | sed 's/^/  - /'

          # Required artifacts — fail the release if any are missing.
          REQUIRED=(
            "SHASUMS256.txt"
          )

          MISSING=()
          for NAME in "${REQUIRED[@]}"; do
            if ! echo "$ASSETS" | grep -qx "$NAME"; then
              MISSING+=("$NAME")
            fi
          done

          # Desirable-but-not-fatal checks.
          if ! echo "$ASSETS" | grep -qx "latest.json"; then
            echo "::warning::latest.json (auto-updater manifest) not present — updater won't work until fixed."
          fi
          for PATTERN in "\\.exe$" "\\.dmg$" "\\.AppImage$"; do
            if ! echo "$ASSETS" | grep -qE "$PATTERN"; then
              echo "::warning::No asset matches $PATTERN — platform coverage incomplete."
            fi
          done

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Release is missing required artifacts:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All required artifacts present."

      - name: Publish release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })

  publish-mcp:
    name: Publish MCP Server to npm
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build MCP server
        working-directory: mcp-4da-server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Publish to npm
        working-directory: mcp-4da-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --provenance || echo "Publish skipped (version may already exist)"
          else
            echo "NPM_TOKEN secret not set — skipping npm publish."
            echo "To enable: add NPM_TOKEN to repo secrets (npm token create --type granular)"
          fi
