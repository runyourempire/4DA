name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.version }}`,
              name: `4DA Home v${{ steps.version.outputs.version }}`,
              body: `## Download\n\nPick the installer for your platform below.\n\n| Platform | File |\n|----------|------|\n| Windows | \`.exe\` (NSIS installer) |\n| macOS | \`.dmg\` |\n| Linux | \`.AppImage\` or \`.deb\` |\n\n---\n\nSee [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`,
              draft: true,
              prerelease: false,
            })
            return data.id

  build-tauri:
    name: Build (${{ matrix.label }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - label: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
          - label: macOS (Intel)
            runner: macos-15
            target: x86_64-apple-darwin
          - label: Linux
            # ubuntu-22.04 is the minimum — Tauri 2.0 requires libwebkit2gtk-4.1-dev
            # which is NOT available on ubuntu-20.04 (only has webkit2gtk 4.0)
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install SSL.com CodeSignTool (Windows EV signing)
        if: runner.os == 'Windows' && env.SSL_COM_CREDENTIAL_ID != ''
        env:
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
        shell: powershell
        run: |
          # Download CodeSignTool for Windows
          $cstUrl = "https://www.ssl.com/download/codesigntool-for-windows/"
          $zipPath = Join-Path $env:RUNNER_TEMP "CodeSignTool.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "CodeSignTool"
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          # Add to PATH for signCommand
          $cstDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          echo "$($cstDir.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # macOS signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows EV signing via SSL.com eSigner (cloud-based, no PFX needed)
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      - name: Report binary sizes
        shell: bash
        run: |
          echo "## Binary Sizes (${{ matrix.label }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Build CLI binary
        working-directory: src-tauri
        run: cargo build --release --bin 4da --target ${{ matrix.target }}

      - name: Upload CLI binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="src-tauri/target/${{ matrix.target }}/release/4da.exe"
            NAME="4da-cli-${{ matrix.target }}.exe"
          else
            BIN="src-tauri/target/${{ matrix.target }}/release/4da"
            NAME="4da-cli-${{ matrix.target }}"
          fi
          cp "$BIN" "$NAME"
          gh release upload "$TAG" "$NAME" --clobber

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })

  publish-mcp:
    name: Publish MCP Server to npm
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install and build MCP server
        working-directory: mcp-4da-server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Publish to npm
        working-directory: mcp-4da-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public --provenance || echo "Publish skipped (version may already exist)"
          else
            echo "NPM_TOKEN secret not set — skipping npm publish."
            echo "To enable: add NPM_TOKEN to repo secrets (npm token create --type granular)"
          fi
