name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: mcp-4da-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mcp-4da-server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: mcp-4da-server
        run: pnpm run build

      - name: Run tests
        working-directory: mcp-4da-server
        run: pnpm run test

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            full: true
          - os: windows-latest
            full: false
          - os: macos-latest
            full: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ matrix.full && 'rustfmt, clippy' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux-only: install system dependencies for Tauri
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Formatting and lints only on Linux (platform-independent checks)
      - name: Check formatting
        if: matrix.full
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy lints
        if: matrix.full
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Check compilation on all platforms
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      # Unit tests on all platforms
      - name: Run unit tests
        working-directory: src-tauri
        run: cargo test --all

      # Integration tests on all platforms
      - name: Run migration tests
        working-directory: src-tauri
        run: cargo test --test migration_tests

      - name: Run pipeline integration tests
        working-directory: src-tauri
        run: cargo test --test pipeline_integration

      - name: Run source resilience tests
        working-directory: src-tauri
        run: cargo test --test source_resilience

      # Full build only on Linux (saves CI minutes; cross-platform build tested in release)
      - name: Build
        if: matrix.full
        working-directory: src-tauri
        run: cargo build
