name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  frontend:
    name: Frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (npm)
        run: pnpm audit --audit-level=high

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Validate IPC commands
        run: node scripts/validate-commands.cjs

      - name: Validate translations (i18n coverage)
        run: node scripts/validate-translations.cjs

      - name: Generate i18n type declarations
        run: pnpm run i18n:types

      - name: Vite cold-start smoke test
        # Catches the Vite dep-reshuffle class of failures (see CLAUDE.md
        # "Vite dep updates + running fourda.exe" gotcha). Cheap and
        # identifies module-resolution regressions before they reach prod.
        run: pnpm run validate:vite-smoke

      - name: Run tests and verify count floor
        run: |
          set +e
          OUTPUT=$(pnpm run test -- --run 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT" | tail -15
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Tests exited with code $EXIT_CODE"
            exit 1
          fi
          COUNT=$(echo "$OUTPUT" | sed -n 's/.*[^0-9]\([0-9][0-9]*\) passed.*/\1/p' | tail -1)
          echo "Frontend tests passed: $COUNT"
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1000 ]; then
            echo "::error::Frontend test count dropped below 1000 (got ${COUNT:-0})"
            exit 1
          fi

  mcp-server:
    name: MCP Server
    needs: frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: false

      - name: Install dependencies
        run: cd mcp-4da-server && pnpm install --frozen-lockfile

      - name: Build
        run: cd mcp-4da-server && pnpm run build

      - name: Run tests
        run: cd mcp-4da-server && pnpm run test

  rust:
    name: Rust (${{ matrix.label }})
    needs: mcp-server
    runs-on: [self-hosted, windows, 4da]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            cargo-features: ''
            test-floor: 2000
          - label: experimental
            cargo-features: '--features experimental'
            test-floor: 0
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: false

      - name: Check formatting
        if: matrix.label == 'default'
        run: cd src-tauri && cargo fmt --check

      - name: Clippy lints
        run: cd src-tauri && cargo clippy ${{ matrix.cargo-features }} -- -D warnings

      - name: Install cargo-audit
        if: matrix.label == 'default'
        run: cargo install cargo-audit --locked

      - name: Security audit
        if: matrix.label == 'default'
        run: cd src-tauri && cargo audit

      - name: Supply chain policy check
        if: matrix.label == 'default'
        run: |
          cargo install cargo-deny --locked
          cd src-tauri && cargo deny check

      - name: Compile-gate (cargo test --no-run)
        # Fast-fail if the test binary stops compiling. Wave 1 blocker was a
        # silent compile break in the test tree that only showed up after
        # the slow full test run — this step catches it in seconds.
        run: cd src-tauri && cargo test --lib ${{ matrix.cargo-features }} --no-run

      - name: Run unit tests and verify count floor
        run: |
          cd src-tauri
          set +e
          OUTPUT=$(cargo test --lib ${{ matrix.cargo-features }} 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT" | tail -10
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Tests exited with code $EXIT_CODE"
            exit 1
          fi
          COUNT=$(echo "$OUTPUT" | sed -n 's/.*ok\. \([0-9]*\) passed.*/\1/p' | tail -1)
          echo "Rust tests passed: $COUNT"
          FLOOR=${{ matrix.test-floor }}
          if [ "$FLOOR" -gt 0 ] && { [ -z "$COUNT" ] || [ "$COUNT" -lt "$FLOOR" ]; }; then
            echo "::error::Rust test count dropped below $FLOOR (got ${COUNT:-0})"
            exit 1
          fi

  # ── Cross-platform validation (GitHub-hosted runners) ──
  rust-macos:
    name: Rust (macOS)
    needs: frontend
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174353f47 # stable

      - name: Clippy lints
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Security audit (cargo audit)
        run: cd src-tauri && cargo audit

      - name: Supply chain policy check (cargo deny)
        run: cd src-tauri && cargo deny check

      - name: Run unit tests
        run: cd src-tauri && cargo test --lib

  rust-linux:
    name: Rust (Linux)
    needs: frontend
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174353f47 # stable

      - name: Clippy lints
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Security audit (cargo audit)
        run: cd src-tauri && cargo audit

      - name: Supply chain policy check (cargo deny)
        run: cd src-tauri && cargo deny check

      - name: Run unit tests
        run: cd src-tauri && cargo test --lib
