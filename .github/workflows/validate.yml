name: Validate

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref. This workflow is PR-only, so a new
# push to a PR makes the in-flight run moot — cancelling it frees the shared
# self-hosted runner immediately instead of queueing redundant work behind it.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  # Detect which parts of the tree a PR actually touches, so the heavy jobs
  # below can skip when irrelevant. This is the throughput lever: most PRs (and
  # nearly every Dependabot npm-subpackage bump) touch ONE area, yet previously
  # paid for the full frontend + MCP + Rust-matrix suite on the single
  # self-hosted runner — the cause of the merge-queue backlog.
  #
  # CRITICAL: filtering is done at the JOB level (via this job's outputs), NOT
  # with `on: pull_request: paths:`. A required status check that is filtered
  # out at the workflow level never reports, which leaves branch protection
  # waiting forever ("Expected — Waiting for status"). Here the workflow always
  # runs and the `Validate Success` aggregate always reports; only the heavy
  # legs conditionally skip (a skipped leg counts as success in the aggregate).
  changes:
    name: Detect changes
    # PR-only: dorny/paths-filter resolves changed files via the API on PRs
    # (robust, no git history needed). On workflow_dispatch this job skips and
    # the heavy legs run via their `github.event_name == 'workflow_dispatch'`
    # clause, so the detector never runs where it lacks a reliable base diff.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mcp: ${{ steps.filter.outputs.mcp }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            rust:
              - 'src-tauri/**'
            frontend:
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'index.html'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'tailwind.config.*'
              - 'scripts/**'
              - 'public/**'
              - 'locales/**'
            mcp:
              - 'mcp-4da-server/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows, 4da]
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          corepack disable
          npm install -g --force pnpm@9.15.0
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (npm)
        run: pnpm audit --audit-level=high

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: No console-window-flashing spawns (INV-043)
        run: node scripts/check-no-window-spawns.cjs

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Validate IPC commands
        run: node scripts/validate-commands.cjs

      - name: Validate translations (i18n coverage)
        run: node scripts/validate-translations.cjs

      - name: Generate i18n type declarations
        run: pnpm run i18n:types

      - name: Vite cold-start smoke test
        # Catches the Vite dep-reshuffle class of failures (see CLAUDE.md
        # "Vite dep updates + running fourda.exe" gotcha). Cheap and
        # identifies module-resolution regressions before they reach prod.
        # Kill fourda.exe first — self-hosted runner may have it holding port 4444.
        run: |
          taskkill /F /IM fourda.exe 2>$null; $true
          pnpm run validate:vite-smoke

      - name: Run tests and verify count floor
        run: |
          pnpm run test -- --run 2>&1 | Out-File -FilePath test-output.txt -Encoding utf8
          $testExit = $LASTEXITCODE
          $output = Get-Content test-output.txt
          $output | Select-Object -Last 15
          if ($testExit -ne 0) {
            Write-Output "::error::Tests exited with code $testExit"
            exit 1
          }
          $count = 0
          foreach ($line in $output) {
            if ($line -match '(\d+)\s+passed') { $count = [int]$Matches[1] }
          }
          Write-Output "Frontend tests passed: $count"
          if ($count -lt 1000) {
            Write-Output "::error::Frontend test count dropped below 1000 (got $count)"
            exit 1
          }
          Remove-Item test-output.txt -ErrorAction SilentlyContinue

  mcp-server:
    name: MCP Server
    # Independent of `frontend` (the old needs:frontend chain forced these to
    # serialize and meant skipping frontend skipped everything downstream).
    # Gating on `changes` lets each leg run/skip on its own and parallelize
    # across multiple runners.
    needs: changes
    if: needs.changes.outputs.mcp == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows, 4da]
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          corepack disable
          npm install -g --force pnpm@9.15.0
          pnpm --version

      - name: Install dependencies
        working-directory: mcp-4da-server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: mcp-4da-server
        run: pnpm run build

      - name: Run tests
        working-directory: mcp-4da-server
        run: pnpm run test

  rust:
    name: Rust (${{ matrix.label }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows, 4da]
    # 75 not 45: the self-hosted box is shared with the whole fleet's dev/cargo
    # churn (dozens of concurrent cargo processes), so a COLD compile here can
    # crawl well past 45 min under contention — long enough to false-timeout a
    # legitimate build (observed on the first run of this very change). Warm
    # runs (clean:false) finish in ~12 min; this ceiling only ever bites a cold,
    # heavily-contended compile, and is still a real hang backstop.
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            cargo-features: ''
            test-floor: 2000
          - label: experimental
            cargo-features: '--features experimental'
            test-floor: 0
    defaults:
      run:
        shell: pwsh
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          # clean: false PRESERVES src-tauri/target between runs on the
          # self-hosted runner — the single biggest throughput win. With the
          # old `clean: true`, every PR wiped target/ and paid a full cold
          # compile (~10 min/leg); a warm incremental build is ~1-2 min. cargo's
          # fingerprinting makes a persisted target safe (stale objects are
          # recompiled, not trusted). The pristine-clone guarantee is
          # hermetic.yml's job (cold by design); Validate optimises for speed.
          # clean: false also keeps the pre-fetched src-tauri/models/, so the
          # tauri build script no longer hard-fails on a missing bundle
          # resource. The fetch step below stays as an idempotent safety net
          # (instant when the models are already present).
          clean: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: Fetch OCR bundle resources (build dependency)
        working-directory: .
        run: node scripts/fetch-ocr-models.cjs

      - name: Check formatting
        if: matrix.label == 'default'
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy ${{ matrix.cargo-features }} -- -D warnings

      - name: Install cargo-audit
        if: matrix.label == 'default'
        working-directory: .
        run: cargo install cargo-audit --locked

      - name: Security audit
        if: matrix.label == 'default'
        run: cargo audit

      - name: Supply chain policy check
        if: matrix.label == 'default'
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Compile-gate (cargo test --no-run)
        # Fast-fail if the test binary stops compiling. Wave 1 blocker was a
        # silent compile break in the test tree that only showed up after
        # the slow full test run — this step catches it in seconds.
        run: cargo test --lib ${{ matrix.cargo-features }} --no-run

      - name: Run unit tests and verify count floor
        run: |
          cargo test --lib ${{ matrix.cargo-features }} 2>&1 | Out-File -FilePath test-output.txt -Encoding utf8
          $testExit = $LASTEXITCODE
          $output = Get-Content test-output.txt
          $output | Select-Object -Last 10
          if ($testExit -ne 0) {
            Write-Output "::error::Tests exited with code $testExit"
            exit 1
          }
          $count = 0
          foreach ($line in $output) {
            if ($line -match 'ok\.\s+(\d+)\s+passed') { $count = [int]$Matches[1] }
          }
          Write-Output "Rust tests passed: $count"
          $floor = [int]'${{ matrix.test-floor }}'
          if ($floor -gt 0 -and $count -lt $floor) {
            Write-Output "::error::Rust test count dropped below $floor (got $count)"
            exit 1
          }
          Remove-Item test-output.txt -ErrorAction SilentlyContinue

  # ─────────────────────────────────────────────────────────────────────
  # Aggregate gate: a SINGLE status check to require in branch protection.
  # Listing each matrix leg (Rust default / experimental, Frontend, MCP) as a
  # required check is brittle — renaming a job silently drops it from the gate.
  # This job depends on all of them and fails if any FAILED or was CANCELLED; a
  # SKIPPED job (a conditional leg that legitimately did not apply) passes.
  # Runs on a hosted runner so the gate itself never ties up the self-hosted box.
  # Require ONLY "Validate Success" (plus "Hermetic Success") in branch protection.
  # Pattern mirrors victauri's ci.yml `ci-success` job.
  # ─────────────────────────────────────────────────────────────────────
  validate-success:
    name: Validate Success
    if: always()
    # Includes `changes` so a failure in the path-detector itself is caught.
    # Path-filtered legs report "skipped", which the check below treats as pass.
    needs: [changes, frontend, mcp-server, rust]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify all required jobs succeeded
        shell: bash
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "dependency results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,*)
              echo "::error::a required Validate job failed or was cancelled ($results)"
              exit 1
              ;;
            *)
              echo "all required Validate jobs succeeded (or were skipped as not-applicable)"
              ;;
          esac

  # ── Cross-platform validation ──
  # Moved to .github/workflows/hermetic.yml (the "Hermetic Fresh-Clone" gate).
  # The old rust-macos / rust-linux jobs here were continue-on-error and rested
  # on a now-false premise — that victauri-plugin was a local path dependency
  # (../../runyourempire/victauri/) only present on the self-hosted runner.
  # victauri-plugin / victauri-test are now registry deps ("0.7", in Cargo.lock),
  # so a GitHub-hosted runner can do a real, GATING fresh build + test. That
  # lives in hermetic.yml (ubuntu + windows, no cache, isolated data dir), which
  # also regression-guards both 2026-06-13 fresh-clone findings. macOS bundles
  # are built in release.yml.
