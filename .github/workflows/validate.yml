name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  frontend:
    name: Frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: false

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (npm)
        run: pnpm audit --audit-level=high

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Validate IPC commands
        run: node scripts/validate-commands.cjs

      - name: Validate translations (i18n coverage)
        run: node scripts/validate-translations.cjs

      - name: Generate i18n type declarations
        run: pnpm run i18n:types

      - name: Vite cold-start smoke test
        # Catches the Vite dep-reshuffle class of failures (see CLAUDE.md
        # "Vite dep updates + running fourda.exe" gotcha). Cheap and
        # identifies module-resolution regressions before they reach prod.
        run: pnpm run validate:vite-smoke

      - name: Run tests and verify count floor
        run: |
          pnpm run test -- --run 2>&1 | Out-File -FilePath test-output.txt -Encoding utf8
          $testExit = $LASTEXITCODE
          $output = Get-Content test-output.txt
          $output | Select-Object -Last 15
          if ($testExit -ne 0) {
            Write-Output "::error::Tests exited with code $testExit"
            exit 1
          }
          $count = 0
          foreach ($line in $output) {
            if ($line -match '(\d+)\s+passed') { $count = [int]$Matches[1] }
          }
          Write-Output "Frontend tests passed: $count"
          if ($count -lt 1000) {
            Write-Output "::error::Frontend test count dropped below 1000 (got $count)"
            exit 1
          }
          Remove-Item test-output.txt -ErrorAction SilentlyContinue

  mcp-server:
    name: MCP Server
    needs: frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: false

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: mcp-4da-server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: mcp-4da-server
        run: pnpm run build

      - name: Run tests
        working-directory: mcp-4da-server
        run: pnpm run test

  rust:
    name: Rust (${{ matrix.label }})
    needs: mcp-server
    runs-on: [self-hosted, windows, 4da]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            cargo-features: ''
            test-floor: 2000
          - label: experimental
            cargo-features: '--features experimental'
            test-floor: 0
    defaults:
      run:
        shell: pwsh
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: false

      - name: Check formatting
        if: matrix.label == 'default'
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy ${{ matrix.cargo-features }} -- -D warnings

      - name: Install cargo-audit
        if: matrix.label == 'default'
        working-directory: .
        run: cargo install cargo-audit --locked

      - name: Security audit
        if: matrix.label == 'default'
        run: cargo audit

      - name: Supply chain policy check
        if: matrix.label == 'default'
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Compile-gate (cargo test --no-run)
        # Fast-fail if the test binary stops compiling. Wave 1 blocker was a
        # silent compile break in the test tree that only showed up after
        # the slow full test run — this step catches it in seconds.
        run: cargo test --lib ${{ matrix.cargo-features }} --no-run

      - name: Run unit tests and verify count floor
        run: |
          cargo test --lib ${{ matrix.cargo-features }} 2>&1 | Out-File -FilePath test-output.txt -Encoding utf8
          $testExit = $LASTEXITCODE
          $output = Get-Content test-output.txt
          $output | Select-Object -Last 10
          if ($testExit -ne 0) {
            Write-Output "::error::Tests exited with code $testExit"
            exit 1
          }
          $count = 0
          foreach ($line in $output) {
            if ($line -match 'ok\.\s+(\d+)\s+passed') { $count = [int]$Matches[1] }
          }
          Write-Output "Rust tests passed: $count"
          $floor = [int]'${{ matrix.test-floor }}'
          if ($floor -gt 0 -and $count -lt $floor) {
            Write-Output "::error::Rust test count dropped below $floor (got $count)"
            exit 1
          }
          Remove-Item test-output.txt -ErrorAction SilentlyContinue

  # ── Cross-platform validation (GitHub-hosted runners) ──
  rust-macos:
    name: Rust (macOS)
    needs: frontend
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Clippy lints
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Security audit (cargo audit)
        run: cd src-tauri && cargo audit

      - name: Supply chain policy check (cargo deny)
        run: cd src-tauri && cargo deny check

      - name: Run unit tests
        run: cd src-tauri && cargo test --lib

  rust-linux:
    name: Rust (Linux)
    needs: frontend
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Clippy lints
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Security audit (cargo audit)
        run: cd src-tauri && cargo audit

      - name: Supply chain policy check (cargo deny)
        run: cd src-tauri && cargo deny check

      - name: Run unit tests
        run: cd src-tauri && cargo test --lib
