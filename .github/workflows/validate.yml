name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  frontend:
    name: Frontend
    runs-on: [self-hosted, windows, 4da]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test -- --run

      - name: Verify frontend test count floor
        shell: bash
        run: |
          OUTPUT=$(pnpm run test -- --run 2>&1)
          COUNT=$(echo "$OUTPUT" | grep -oP '\d+ passed' | tail -1 | grep -oP '\d+')
          echo "Frontend tests: $COUNT"
          if [ "$COUNT" -lt 700 ]; then
            echo "::error::Frontend test count dropped below 700 (got $COUNT)"
            exit 1
          fi

  mcp-server:
    name: MCP Server
    needs: frontend
    runs-on: [self-hosted, windows, 4da]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install dependencies
        shell: bash
        run: cd mcp-4da-server && pnpm install --frozen-lockfile

      - name: Build
        shell: bash
        run: cd mcp-4da-server && pnpm run build

      - name: Run tests
        shell: bash
        run: cd mcp-4da-server && pnpm run test

  rust:
    name: Rust
    needs: mcp-server
    runs-on: [self-hosted, windows, 4da]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Check formatting
        shell: bash
        run: cd src-tauri && cargo fmt --check

      - name: Clippy lints
        shell: bash
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Cargo check
        shell: bash
        run: cd src-tauri && cargo check

      - name: Run unit tests
        shell: bash
        run: cd src-tauri && cargo test --lib

      - name: Verify Rust test count floor
        shell: bash
        run: |
          cd src-tauri
          OUTPUT=$(cargo test --lib 2>&1)
          COUNT=$(echo "$OUTPUT" | grep -oP '\d+ passed' | tail -1 | grep -oP '\d+')
          echo "Rust tests: $COUNT"
          if [ "$COUNT" -lt 900 ]; then
            echo "::error::Test count dropped below 900 (got $COUNT)"
            exit 1
          fi

      - name: Run migration tests
        shell: bash
        run: cd src-tauri && cargo test --test migration_tests

      - name: Run pipeline integration tests
        shell: bash
        run: cd src-tauri && cargo test --test pipeline_integration

      - name: Run source resilience tests
        shell: bash
        run: cd src-tauri && cargo test --test source_resilience

      - name: SQL schema validation
        shell: bash
        run: cd src-tauri && cargo test --test sql_checker --features sql-check

      - name: Build
        shell: bash
        run: cd src-tauri && cargo build
