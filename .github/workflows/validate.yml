name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  frontend:
    name: Frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check file sizes
        run: node scripts/check-file-sizes.cjs --ci

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Run tests and verify count floor
        run: |
          set +e
          OUTPUT=$(pnpm run test -- --run 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT" | tail -15
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Tests exited with code $EXIT_CODE"
            exit 1
          fi
          COUNT=$(echo "$OUTPUT" | sed -n 's/.*[^0-9]\([0-9][0-9]*\) passed.*/\1/p' | tail -1)
          echo "Frontend tests passed: $COUNT"
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 700 ]; then
            echo "::error::Frontend test count dropped below 700 (got ${COUNT:-0})"
            exit 1
          fi

  mcp-server:
    name: MCP Server
    needs: frontend
    runs-on: [self-hosted, windows, 4da]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install dependencies
        run: cd mcp-4da-server && pnpm install --frozen-lockfile

      - name: Build
        run: cd mcp-4da-server && pnpm run build

      - name: Run tests
        run: cd mcp-4da-server && pnpm run test

  rust:
    name: Rust (${{ matrix.label }})
    needs: mcp-server
    runs-on: [self-hosted, windows, 4da]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            cargo-features: ''
            test-floor: 1400
          - label: experimental
            cargo-features: '--features experimental'
            test-floor: 0
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Check formatting
        if: matrix.label == 'default'
        run: cd src-tauri && cargo fmt --check

      - name: Clippy lints
        run: cd src-tauri && cargo clippy ${{ matrix.cargo-features }} -- -D warnings

      - name: Security audit
        if: matrix.label == 'default'
        run: |
          if command -v cargo-audit &> /dev/null; then
            cd src-tauri && cargo audit
          else
            echo "::warning::cargo-audit not installed"
          fi

      - name: Run unit tests and verify count floor
        run: |
          cd src-tauri
          set +e
          OUTPUT=$(cargo test --lib ${{ matrix.cargo-features }} 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT" | tail -10
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Tests exited with code $EXIT_CODE"
            exit 1
          fi
          COUNT=$(echo "$OUTPUT" | sed -n 's/.*ok\. \([0-9]*\) passed.*/\1/p' | tail -1)
          echo "Rust tests passed: $COUNT"
          FLOOR=${{ matrix.test-floor }}
          if [ "$FLOOR" -gt 0 ] && { [ -z "$COUNT" ] || [ "$COUNT" -lt "$FLOOR" ]; }; then
            echo "::error::Rust test count dropped below $FLOOR (got ${COUNT:-0})"
            exit 1
          fi
