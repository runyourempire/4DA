# Pinned Rust toolchain for supply chain hardening.
# Prevents silent auto-updates that could introduce compromised toolchain components.
# Update policy: bump only after security review of the new toolchain release.
# Last reviewed: 2026-06-25 (Rust 1.95.0 — current stable, released 2026-04-14;
#   reviewed + approved. Prior: 2026-02-11 Rust 1.93.1.)

[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
