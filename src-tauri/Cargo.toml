[package]
name = "fourda"
version = "0.1.0"
description = "4DA - The internet searches for you"
authors = ["4DA Team"]
edition = "2021"
default-run = "fourda"

[lib]
name = "fourda_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-opener = "2"
tauri-plugin-notification = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# File watching
notify = "8"

# HTML parsing (for HN content scraping)
scraper = "0.23"

# Embeddings (local MiniLM model)
fastembed = "4"

# Thread-safe state
once_cell = "1"
parking_lot = "0.12"

# Sync HTTP client (for CLI test)
ureq = { version = "2", features = ["json"] }

# Database (sqlite + vector search)
rusqlite = { version = "0.32", features = ["bundled"] }
sqlite-vec = "0.1"
zerocopy = { version = "0.8", features = ["derive"] }

# Hashing for deduplication
sha2 = "0.10"
hex = "0.4"

# Timestamps
chrono = { version = "0.4", features = ["serde"] }

# Directory utilities (for home dir resolution)
dirs = "5"

# Async trait support
async-trait = "0.1"

[profile.release]
strip = true
lto = true
codegen-units = 1
