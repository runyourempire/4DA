<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>4DA Signal Terminal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#D4AF37">
<link rel="icon" href="/icon" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--bg2:#0D0D0D;--bg3:#1A1A1A;
  --fg:#D0D0D0;--muted:#555;--dim:#333;
  --gold:#D4AF37;--gold-dim:rgba(212,175,55,0.15);
  --green:#22C55E;--red:#EF4444;--cyan:#67E8F9;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--fg);
  font:14px/1.6 'JetBrains Mono','SF Mono','Fira Code','Cascadia Code',monospace;
  display:flex;flex-direction:column;
}
/* Header */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--dim);flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.pulse{
  width:10px;height:10px;border-radius:50%;background:var(--gold);
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
.hdr-title{font-size:13px;font-weight:600;color:var(--gold);letter-spacing:1px}
.hdr-right{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.live-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.live-dot.off{background:var(--red)}
/* Output */
.output{
  flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:var(--dim) transparent;
}
.output::-webkit-scrollbar{width:6px}
.output::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
.output::-webkit-scrollbar-track{background:transparent}
.out-line{margin-bottom:2px;word-wrap:break-word}
.out-cmd{color:var(--gold);margin:12px 0 4px}
.out-cmd:first-child{margin-top:0}
.g{color:var(--gold)}.gr{color:var(--green)}.r{color:var(--red)}.c{color:var(--cyan)}
.m{color:var(--muted)}.d{color:var(--dim)}
a{color:var(--gold);text-decoration:none}a:hover{text-decoration:underline}
/* Bar chart */
.bar{display:inline-block;letter-spacing:-1px;font-size:12px}
.bar-fill{color:var(--gold)}.bar-empty{color:var(--dim)}
/* Input */
.input-row{
  display:flex;align-items:center;gap:0;
  padding:8px 16px;border-top:1px solid var(--dim);flex-shrink:0;
  background:var(--bg2);
}
.prompt-char{
  color:var(--gold);font-weight:700;font-size:15px;
  margin-right:8px;user-select:none;
  animation:breathe 3s ease-in-out infinite;
}
.cmd-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--fg);font:inherit;caret-color:var(--gold);
}
.cmd-input::placeholder{color:var(--dim)}
/* Status bar */
.status-bar{
  display:flex;align-items:center;gap:12px;
  padding:4px 16px;font-size:11px;color:var(--muted);
  border-top:1px solid var(--dim);flex-shrink:0;background:var(--bg);
}
.status-bar .sep{color:var(--dim)}
/* Auth overlay */
.auth-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  display:flex;align-items:center;justify-content:center;z-index:100;
}
.auth-box{
  background:var(--bg2);border:1px solid var(--dim);border-radius:8px;
  padding:24px 28px;max-width:420px;width:90%;
}
.auth-box h2{font-size:14px;color:var(--gold);margin-bottom:12px;font-weight:600}
.auth-box p{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.auth-box input{
  width:100%;background:var(--bg);border:1px solid var(--dim);
  color:var(--fg);font:13px/1 inherit;padding:10px 12px;
  border-radius:4px;outline:none;margin-bottom:8px;
}
.auth-box input:focus{border-color:var(--gold)}
.auth-box .skip{
  font-size:11px;color:var(--dim);cursor:pointer;text-align:center;
  margin-top:8px;
}
.auth-box .skip:hover{color:var(--muted)}
/* Ambient mode */
.ambient .hdr,.ambient .input-row,.ambient .status-bar{display:none}
.ambient .output{padding:24px 32px}
.ambient .amb-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%;
}
.ambient .amb-section{
  background:var(--bg2);border:1px solid var(--dim);border-radius:8px;padding:16px;
  overflow-y:auto;
}
.ambient .amb-section h3{
  font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:12px;font-weight:600;
}
/* Responsive */
@media(max-width:600px){
  body{font-size:12px}
  .hdr{padding:8px 12px}
  .output{padding:12px}
  .input-row{padding:8px 12px}
  .status-bar{padding:4px 12px;flex-wrap:wrap;gap:6px}
  .ambient .amb-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="pulse" id="pulse"></div>
    <span class="hdr-title">4DA SIGNAL TERMINAL</span>
  </div>
  <div class="hdr-right">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveText">...</span>
  </div>
</div>
<div class="output" id="out" role="log" aria-live="polite"></div>
<div class="input-row">
  <span class="prompt-char" aria-hidden="true">&gt;</span>
  <input class="cmd-input" id="inp" type="text" placeholder="type a command..." autocomplete="off" autofocus spellcheck="false" aria-label="Terminal command input">
</div>
<div class="status-bar" id="sbar">
  <span id="sb-mon">...</span><span class="sep">·</span>
  <span id="sb-scan">...</span><span class="sep">·</span>
  <span id="sb-rel">...</span><span class="sep">·</span>
  <span id="sb-thr">...</span>
</div>
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-box">
    <h2>Signal Terminal Authentication</h2>
    <p>Enter your token from <code style="color:var(--gold)">data/signal_terminal_token.txt</code></p>
    <input type="password" id="authInput" placeholder="paste token..." autocomplete="off">
    <div class="skip" id="authSkip">Skip — try localhost without token</div>
  </div>
</div>
<script>
(function(){
'use strict';
var out=document.getElementById('out'),inp=document.getElementById('inp');
var liveDot=document.getElementById('liveDot'),liveText=document.getElementById('liveText');
var authOverlay=document.getElementById('authOverlay'),authInput=document.getElementById('authInput');
var history=[],histIdx=-1,histBuf='';
var token=localStorage.getItem('4da_term_token')||'';
var isAmbient=false,ambInterval=null;

// ── Welcome ──
function welcome(){
  out.innerHTML='';
  w('4DA Signal Terminal v1.0.0','g');
  w('All signal. No feed.','m');
  w('');
  w("Type 'help' for commands.",'m');
  w('');
}

// ── Output helpers ──
function w(text,cls){
  var d=document.createElement('div');d.className='out-line';
  if(cls)d.innerHTML='<span class="'+cls+'">'+esc(text)+'</span>';
  else d.textContent=text;
  out.appendChild(d);scroll();
}
function wh(html){
  var d=document.createElement('div');d.className='out-line';d.innerHTML=html;
  out.appendChild(d);scroll();
}
function wcmd(text){
  var d=document.createElement('div');d.className='out-line out-cmd';
  d.innerHTML='<span class="g">&gt; '+esc(text)+'</span>';
  out.appendChild(d);scroll();
}
function wsep(label){
  wh('<span class="m">── '+esc(label)+' ──────────────────────────</span>');
}
function wkv(key,val,cls){
  var v=cls?'<span class="'+cls+'">'+esc(String(val))+'</span>':esc(String(val));
  wh('<span class="m">  '+esc(key).padEnd(14)+'</span>'+v);
}
function bar(score,width){
  var n=Math.round(score*(width||10));
  var filled='▓'.repeat(n),empty='░'.repeat((width||10)-n);
  return '<span class="bar"><span class="bar-fill">'+filled+'</span><span class="bar-empty">'+empty+'</span></span>';
}
function scroll(){out.scrollTop=out.scrollHeight}
function esc(s){
  if(s==null)return'';s=String(s);
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function link(url,text){return'<a href="'+escAttr(url)+'" target="_blank" rel="noopener">'+esc(text)+'</a>'}

// ── API ──
function api(endpoint){
  var h=token?{'X-4DA-Token':token}:{};
  return fetch(endpoint,{headers:h}).then(function(r){
    if(r.status===401){showAuth();throw new Error('auth')}
    return r.json();
  });
}
function showAuth(){authOverlay.style.display='flex';authInput.focus()}
function hideAuth(){authOverlay.style.display='none';inp.focus()}

// ── Auth ──
authInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    token=this.value.trim();
    if(token){localStorage.setItem('4da_term_token',token);hideAuth();refreshStatus()}
  }
});
document.getElementById('authSkip').addEventListener('click',function(){
  token='';hideAuth();refreshStatus();
});

// ── Status bar ──
function refreshStatus(){
  api('/api/status').then(function(d){
    liveDot.className='live-dot '+(d.monitoring?'on':'off');
    liveText.textContent=d.monitoring?'LIVE':'IDLE';
    document.getElementById('sb-mon').textContent=d.monitoring?'● monitoring':'○ idle';
    document.getElementById('sb-scan').textContent=(d.total_scanned||0)+' scanned';
    document.getElementById('sb-rel').textContent=(d.total_relevant||0)+' relevant';
    document.getElementById('sb-thr').textContent='threshold: '+(d.threshold||0.35);
  }).catch(function(){
    liveDot.className='live-dot off';liveText.textContent='OFFLINE';
    document.getElementById('sb-mon').textContent='● disconnected';
  });
}

// ── Input handling ──
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var cmd=this.value.trim();if(!cmd)return;
    history.push(cmd);if(history.length>100)history.shift();
    histIdx=-1;histBuf='';
    this.value='';
    exec(cmd);
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(histIdx===-1)histBuf=this.value;
    if(histIdx<history.length-1){histIdx++;this.value=history[history.length-1-histIdx]}
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(histIdx>0){histIdx--;this.value=history[history.length-1-histIdx]}
    else if(histIdx===0){histIdx=-1;this.value=histBuf}
  } else if(e.key==='l'&&e.ctrlKey){e.preventDefault();out.innerHTML=''}
  else if(e.key==='k'&&e.ctrlKey){e.preventDefault();inp.focus()}
});
// Focus input on keypress anywhere
document.addEventListener('keydown',function(e){
  if(e.target===inp||e.target===authInput)return;
  if(isAmbient){exitAmbient();return}
  if(!e.ctrlKey&&!e.altKey&&!e.metaKey&&e.key.length===1)inp.focus();
});

// ── Command execution ──
function exec(raw){
  wcmd(raw);
  var parts=raw.split(/\s+/);var cmd=parts[0].toLowerCase();var arg=parts.slice(1).join(' ');
  switch(cmd){
    case'help':cmdHelp();break;
    case'signals':cmdSignals();break;
    case'briefing':cmdBriefing();break;
    case'score':cmdScore(arg);break;
    case'search':cmdSearch(arg);break;
    case'radar':cmdRadar();break;
    case'decisions':cmdDecisions();break;
    case'dna':cmdDna();break;
    case'gaps':cmdGaps();break;
    case'status':cmdStatus();break;
    case'clear':out.innerHTML='';break;
    case'ambient':enterAmbient();break;
    case'token':showAuth();break;
    default:w('Unknown command: '+cmd+". Type 'help' for available commands.",'r');
  }
}

// ── Commands ──
function cmdHelp(){
  wsep('COMMANDS');
  wkv('signals','Show current signals above threshold');
  wkv('briefing','Today\'s intelligence briefing');
  wkv('score <url>','Score a URL against your profile');
  wkv('search <q>','Search scored items');
  wkv('radar','Tech radar — adopt/trial/assess/hold');
  wkv('decisions','Active decision windows');
  wkv('dna','Your Developer DNA profile');
  wkv('gaps','Knowledge blind spots');
  wkv('status','System status');
  wkv('clear','Clear terminal');
  wkv('ambient','Ambient display mode');
  wkv('token','Re-authenticate');
  w('');
  wh('<span class="m">  Keyboard: ↑↓ history · Ctrl+L clear · Ctrl+K focus</span>');
}

function cmdSignals(){
  w('Loading signals...','m');
  api('/api/signals').then(function(d){
    rmLast();
    if(!d.signals||!d.signals.length){w('No signals found. Run an analysis first.','m');return}
    wsep('SIGNALS ('+d.count+')');w('');
    d.signals.forEach(function(s){
      var icon=s.signal_priority==='critical'?'⚡':s.signal_priority==='high'?'◆':'◇';
      var scr=Math.round((s.score_raw||0)*100);
      var title=s.url?link(s.url,s.title):esc(s.title);
      wh(icon+' <span class="g">['+scr+']</span> '+title);
      var meta=[];
      if(s.signal_type)meta.push(s.signal_type);
      if(s.signal_priority)meta.push(s.signal_priority);
      if(s.source)meta.push(s.source);
      if(s.signal_action)meta.push('Act: '+s.signal_action);
      if(meta.length)wh('       <span class="m">'+esc(meta.join(' · '))+'</span>');
    });
    w('');wh('<span class="d">'+d.count+' signals. The rest was noise.</span>');
  }).catch(apiErr);
}

function cmdBriefing(){
  w('Generating briefing...','m');
  api('/api/briefing').then(function(d){
    rmLast();
    if(d.empty){w(d.message||'No items. Run an analysis first.','m');return}
    wsep('BRIEFING');w('');
    wh('<span class="g">'+d.total_items+' items analyzed</span>');w('');
    if(d.top_items)d.top_items.forEach(function(item,i){
      var title=item.url?link(item.url,item.title):esc(item.title);
      wh('<span class="m">'+(i+1)+'. </span>'+title+' <span class="m">'+esc(item.source)+' '+esc(item.score)+'</span>');
    });
    if(d.source_summary){
      w('');wsep('SOURCES');
      Object.keys(d.source_summary).forEach(function(k){wkv(k,d.source_summary[k])});
    }
  }).catch(apiErr);
}

function cmdScore(url){
  if(!url){w('Usage: score <url>','r');return}
  w('Scoring...','m');
  api('/api/score?url='+encodeURIComponent(url)).then(function(d){
    rmLast();
    if(!d.found){w('URL not found in current analysis results.','m');w('Only URLs from the latest analysis can be scored.','m');return}
    wsep('SCORE');w('');
    var scr=Math.round((d.score||0)*100);
    wh('<span class="g">RELEVANCE: '+scr+'/100</span>  '+bar(d.score));
    w('');
    if(d.breakdown){
      var b=d.breakdown;
      var axes=[
        ['Context',b.context_score],['Interest',b.interest_score],
        ['Keyword',b.keyword_score],['ACE',b.ace_boost],
        ['Deps',b.dep_match_score],['Freshness',b.freshness_mult],
        ['Quality',b.content_quality_mult],['Domain',b.domain_relevance]
      ];
      var delay=0;
      axes.forEach(function(a){
        setTimeout(function(){
          var val=a[1]!=null?a[1]:0;
          var label=a[0].padEnd(12);
          wh('  '+bar(Math.min(val,1))+' <span class="m">'+esc(label)+'</span>'+
             '<span class="g">'+(typeof val==='number'?val.toFixed(2):'—')+'</span>');
        },delay);
        delay+=150;
      });
      setTimeout(function(){
        w('');
        var sigs=b.confirmed_signals||b.signal_count||0;
        var total=Math.max(sigs,1);
        wh('<span class="m">  Confirmation: '+sigs+'/'+total+' axes agree. '+(scr>=70?'Strong':'Moderate')+' signal.</span>');
        if(d.explanation)wh('<span class="m">  '+esc(d.explanation)+'</span>');
      },delay);
    }
    if(d.signal_type)wkv('Signal',d.signal_type+(d.signal_priority?' ['+d.signal_priority+']':''));
  }).catch(apiErr);
}

function cmdSearch(q){
  if(!q){w('Usage: search <query>','r');return}
  w('Searching...','m');
  api('/api/search?q='+encodeURIComponent(q)).then(function(d){
    rmLast();
    wsep('SEARCH: '+d.query);w('');
    if(!d.results||!d.results.length){w('No results found.','m');return}
    wh('<span class="g">'+d.count+' results</span>');w('');
    d.results.forEach(function(r,i){
      var scr=Math.round((r.score||0)*100);
      var title=r.url?link(r.url,r.title):esc(r.title);
      var rel=r.relevant?' <span class="gr">relevant</span>':'';
      wh('<span class="m">'+(i+1).toString().padStart(2)+'. </span>'+title+
         ' <span class="m">'+esc(r.source)+' '+scr+'%</span>'+rel);
    });
  }).catch(apiErr);
}

function cmdRadar(){
  w('Loading radar...','m');
  api('/api/radar').then(function(d){
    rmLast();
    if(!d.entries||!d.entries.length){w('No radar entries. Run an analysis to populate.','m');return}
    wsep('TECH RADAR');w('');
    var rings=['adopt','trial','assess','hold'];
    var colors={adopt:'gr',trial:'g',assess:'m',hold:'r'};
    rings.forEach(function(ring){
      var items=d.entries.filter(function(e){return e.ring===ring});
      if(!items.length)return;
      wh('<span class="'+colors[ring]+'">  '+ring.toUpperCase().padEnd(10)+'</span>'+
         items.map(function(e){return esc(e.name)+' <span class="m">('+((e.score||0)*100).toFixed(0)+')</span>'}).join('  '));
    });
  }).catch(apiErr);
}

function cmdDecisions(){
  w('Loading decisions...','m');
  api('/api/decisions').then(function(d){
    rmLast();
    wsep('DECISION WINDOWS');w('');
    if(!d.windows||!d.windows.length){w('No open decision windows.','m');return}
    d.windows.forEach(function(w2){
      var urg=Math.round((w2.urgency||0)*100);
      var icon=urg>70?'⚡':urg>40?'⏳':'◇';
      var urgCls=urg>70?'r':urg>40?'g':'m';
      wh(icon+' <span class="g">'+esc(w2.title)+'</span>');
      wh('    <span class="m">type: </span>'+esc(w2.type||'—')+
         '  <span class="m">urgency: </span><span class="'+urgCls+'">'+urg+'%</span>');
      if(w2.dependency)wh('    <span class="m">dep: </span>'+esc(w2.dependency));
      if(w2.expires_at)wh('    <span class="m">expires: </span>'+esc(w2.expires_at));
      w('');
    });
  }).catch(apiErr);
}

function cmdDna(){
  w('Generating DNA profile...','m');
  api('/api/dna').then(function(d){
    rmLast();
    if(d.error){w(d.error,'r');return}
    wsep('DEVELOPER DNA');w('');
    if(d.identity_summary)wh('<span class="g">'+esc(d.identity_summary)+'</span>');
    w('');
    if(d.primary_stack&&d.primary_stack.length)wkv('Primary',d.primary_stack.join(' · '));
    if(d.adjacent_tech&&d.adjacent_tech.length)wkv('Adjacent',d.adjacent_tech.join(' · '));
    if(d.interests&&d.interests.length)wkv('Interests',d.interests.join(' · '));
    if(d.stats){
      w('');wsep('STATS');
      wkv('Processed',d.stats.total_items_processed);
      wkv('Relevant',d.stats.total_relevant);
      wkv('Rejection',d.stats.rejection_rate+'%');
      wkv('Projects',d.stats.project_count);
      wkv('Dependencies',d.stats.dependency_count);
      wkv('Days Active',d.stats.days_active);
    }
    if(d.top_engaged_topics&&d.top_engaged_topics.length){
      w('');wsep('TOP TOPICS');
      d.top_engaged_topics.forEach(function(t){
        wh('  '+bar(t.percent_of_total/100,8)+' <span class="m">'+esc(t.topic).padEnd(16)+'</span>'+t.interactions+' interactions');
      });
    }
  }).catch(apiErr);
}

function cmdGaps(){
  w('Detecting gaps...','m');
  api('/api/gaps').then(function(d){
    rmLast();
    wsep('KNOWLEDGE GAPS');w('');
    if(!d.gaps||!d.gaps.length){w('No knowledge gaps detected. Your coverage is solid.','gr');return}
    wh('<span class="g">'+d.count+' gaps detected</span>');w('');
    d.gaps.forEach(function(g){
      var sevCls=g.severity==='critical'?'r':g.severity==='high'?'g':'m';
      wh('<span class="'+sevCls+'">  '+esc(g.dependency)+'</span> <span class="m">'+esc(g.severity)+'</span>');
      wh('    <span class="m">stale: '+g.days_since_engagement+'d · missed: '+g.missed_items_count+' items</span>');
    });
  }).catch(apiErr);
}

function cmdStatus(){
  w('Checking status...','m');
  api('/api/status').then(function(d){
    rmLast();
    wsep('SYSTEM STATUS');w('');
    wkv('Monitoring',d.monitoring?'active':'inactive',d.monitoring?'gr':'r');
    wkv('Last Analysis',d.last_analysis||'never');
    wkv('Total Scanned',d.total_scanned||0);
    wkv('Relevant',d.total_relevant||0);
    wkv('Threshold',d.threshold||0.35);
    if(d.total_scanned>0){
      var rate=((1-(d.total_relevant||0)/(d.total_scanned||1))*100).toFixed(1);
      wkv('Rejection Rate',rate+'%');
    }
  }).catch(apiErr);
}

// ── Ambient mode ──
function enterAmbient(){
  isAmbient=true;document.body.classList.add('ambient');
  out.innerHTML='';
  var grid=document.createElement('div');grid.className='amb-grid';
  grid.innerHTML=
    '<div class="amb-section" id="amb-sig"><h3>Signals</h3><div class="amb-content"></div></div>'+
    '<div class="amb-section" id="amb-radar"><h3>Tech Radar</h3><div class="amb-content"></div></div>'+
    '<div class="amb-section" id="amb-dec"><h3>Decision Windows</h3><div class="amb-content"></div></div>'+
    '<div class="amb-section" id="amb-status"><h3>System</h3><div class="amb-content"></div></div>';
  out.appendChild(grid);
  refreshAmbient();
  ambInterval=setInterval(refreshAmbient,60000);
}
function exitAmbient(){
  isAmbient=false;document.body.classList.remove('ambient');
  if(ambInterval){clearInterval(ambInterval);ambInterval=null}
  welcome();inp.focus();
}
function refreshAmbient(){
  Promise.all([
    api('/api/signals').catch(function(){return{signals:[]}}),
    api('/api/radar').catch(function(){return{entries:[]}}),
    api('/api/decisions').catch(function(){return{windows:[]}}),
    api('/api/status').catch(function(){return{}})
  ]).then(function(res){
    var sigs=res[0],radar=res[1],decs=res[2],status=res[3];
    // Signals
    var sc=document.querySelector('#amb-sig .amb-content');if(sc){
      sc.innerHTML=(sigs.signals||[]).slice(0,10).map(function(s){
        var icon=s.signal_priority==='critical'?'⚡':s.signal_priority==='high'?'◆':'◇';
        var scr=Math.round((s.score_raw||0)*100);
        return'<div class="out-line">'+icon+' <span class="g">['+scr+']</span> '+esc(s.title)+'</div>';
      }).join('')||'<div class="out-line m">No signals</div>';
    }
    // Radar
    var rc=document.querySelector('#amb-radar .amb-content');if(rc){
      var rings=['adopt','trial','assess','hold'];
      var colors={adopt:'gr',trial:'g',assess:'m',hold:'r'};
      rc.innerHTML=rings.map(function(ring){
        var items=(radar.entries||[]).filter(function(e){return e.ring===ring});
        if(!items.length)return'';
        return'<div class="out-line"><span class="'+colors[ring]+'">'+ring.toUpperCase()+'</span> '+
          items.map(function(e){return esc(e.name)}).join(' · ')+'</div>';
      }).join('')||'<div class="out-line m">No entries</div>';
    }
    // Decisions
    var dc=document.querySelector('#amb-dec .amb-content');if(dc){
      dc.innerHTML=(decs.windows||[]).map(function(w2){
        return'<div class="out-line">⏳ <span class="g">'+esc(w2.title)+'</span> <span class="m">'+esc(w2.type||'')+'</span></div>';
      }).join('')||'<div class="out-line m">No open windows</div>';
    }
    // Status
    var stc=document.querySelector('#amb-status .amb-content');if(stc){
      stc.innerHTML=
        '<div class="out-line"><span class="m">Monitoring:</span> <span class="'+(status.monitoring?'gr':'r')+'">'+
        (status.monitoring?'active':'off')+'</span></div>'+
        '<div class="out-line"><span class="m">Scanned:</span> '+(status.total_scanned||0)+'</div>'+
        '<div class="out-line"><span class="m">Relevant:</span> '+(status.total_relevant||0)+'</div>'+
        '<div class="out-line"><span class="m">Last:</span> '+esc(status.last_analysis||'never')+'</div>';
    }
  });
}

// ── Helpers ──
function rmLast(){var lines=out.querySelectorAll('.out-line');if(lines.length)lines[lines.length-1].remove()}
function apiErr(e){if(e.message!=='auth')w('Error: '+e.message,'r')}

// ── Init ──
welcome();
// Try status first — if 401, show auth
api('/api/status').then(function(d){
  liveDot.className='live-dot on';liveText.textContent='LIVE';
  refreshStatus();
}).catch(function(e){
  if(e.message==='auth')showAuth();
  else{liveDot.className='live-dot off';liveText.textContent='OFFLINE'}
});
setInterval(refreshStatus,30000);
inp.focus();
})();
</script>
