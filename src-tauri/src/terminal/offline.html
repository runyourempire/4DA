<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4DA Signal Terminal — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#030303;color:#C8C8C8;
  font:14px/1.6 'JetBrains Mono','SF Mono','Fira Code',monospace;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:24px;
}
.box{max-width:480px}
h1{font-size:20px;color:#D4AF37;font-weight:600;margin-bottom:8px;letter-spacing:1px}
p{color:#555;font-size:12px;line-height:1.7;margin-bottom:16px}
code{color:#D4AF37;background:#111;padding:2px 8px;border-radius:4px;font-size:12px}
.pulse{
  width:48px;height:48px;border-radius:50%;
  border:2px solid #2A2A2A;margin:0 auto 24px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#555;
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}
.retry{
  color:#D4AF37;font-size:11px;cursor:pointer;margin-top:24px;
  opacity:0.5;transition:opacity 0.2s;
}
.retry:hover{opacity:1}
</style>
</head>
<body>
<div class="box">
  <div class="pulse">4</div>
  <h1>Signal Terminal Offline</h1>
  <p>The 4DA desktop app isn't running.<br>
  The Signal Terminal is embedded in the app — it starts when the app starts.</p>
  <p>To connect:<br>
  <code>pnpm run tauri dev</code><br>
  or launch the 4DA application</p>
  <p style="color:#333;font-size:11px;margin-top:32px">
  The terminal will reconnect automatically when the app is available.
  </p>
  <div class="retry" onclick="location.reload()">retry connection</div>
  <script>setInterval(function(){
    fetch('/api/status').then(function(r){if(r.ok)location.reload()}).catch(function(){});
  }, 5000);</script>
</div>
</body>
</html>
